          case 'sport':   return (a.sport || '').localeCompare(b.sport || '');
          case 'risk':
          default:        return b.risk - a.risk;
        }
      });

      html += '<div class="data-card">';
      html += '<h3>By Team · ' + teamRowsRaw.length + (teamFiltered.length !== teamRowsRaw.length ? ` (showing ${teamFiltered.length})` : '') + '</h3>';
      html += '<div class="toolbar">';
      html += `<input type="text" placeholder="Filter teams…" value="${escapeHtml(_expState.teamFilter)}" oninput="expSetTeamFilter(this.value)" />`;
      html += '<select onchange="expSetTeamSort(this.value)">';
      const tOpts = { risk: 'Risk ↓', parlays: 'Parlays ↓', name: 'Name A-Z', sport: 'Sport' };
      for (const [v, label] of Object.entries(tOpts)) html += `<option value="${v}" ${_expState.teamSort === v ? 'selected' : ''}>${label}</option>`;
      html += '</select>';
      if (_expState.teamFilter) html += `<button class="clear-btn" onclick="expSetTeamFilter('')">×</button>`;
      html += '</div>';

      if (teamSorted.length === 0) {
        html += '<div class="empty-mini">No teams match.</div>';
      } else {
        for (const t of teamSorted.slice(0, 60)) {
          const pct = capPct(t.risk, teamCap);
          const cls = capCls(pct);
          const isOpen = _expState.openTeams.has(t.key);
          const cached = _expState.teamParlayCache[t.key];
          html += `<div class="row expandable ${isOpen ? 'open' : ''}" onclick="expToggleTeam('${t.key.replace(/'/g, '&#39;')}')">`;
          html += `<span class="label"><span class="caret-mini">▶</span>${escapeHtml(t.name)}<div class="sublabel">${fmtMoney(t.risk)}${teamCap ? ' / ' + fmtMoney(teamCap) : ''} · ${t.parlays} parlay${t.parlays === 1 ? '' : 's'}${t.eventName ? ' · ' + escapeHtml(t.eventName) : ''}</div></span>`;
          html += `<span class="value ${cls}">${teamCap ? pct.toFixed(0) + '%' : ''}</span></div>`;
          if (teamCap) html += `<div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>`;
          if (isOpen) html += _renderTeamParlayRows(cached);
        }
      }
      html += '</div>';

      if (gameRowsRaw.length === 0 && teamRowsRaw.length === 0) {
        html += '<div class="empty">No active exposure</div>';
      }

      el.innerHTML = html;
    }

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
    }

    // ===== Tier 2 — Player Props tab =====
    // Per-(sport, player) exposure with cap fill bars. Pulled directly from
    // /player-exposure which already tracks Phase-2 NBA points/rebounds/
    // assists/threes_made + NHL shots_on_goal. Useful to spot heavy concen-
    // tration on a single player before the cap blocks an RFQ.
    let _propsLastFetch = 0;
    async function loadProps() {
      if (Date.now() - _propsLastFetch < 30000 && document.getElementById('props-section').dataset.loaded) return;
      _propsLastFetch = Date.now();
      try {
        // Pull all three sources in parallel:
        //   - /player-exposure: live per-(sport, player) caps
        //   - /prop-flow:       last ~200 prop-leg RFQs (in-memory rolling log)
        //   - /orders:          recent confirmed parlays (filter to ones with prop legs)
        const [expResp, flowResp, ordersResp] = await Promise.all([
          fetch(BASE + '/player-exposure'),
          fetch(BASE + '/prop-flow?limit=200').catch(() => null),
          fetch(BASE + '/orders').catch(() => null),
        ]);
        const exp = await expResp.json();
        const flow = flowResp ? await flowResp.json().catch(() => null) : null;
        const orders = ordersResp ? await ordersResp.json().catch(() => null) : null;
        renderProps(exp, flow, orders);
        document.getElementById('props-section').dataset.loaded = '1';
      } catch (e) {
        document.getElementById('props-section').innerHTML = '<div class="empty">Failed to load: ' + (e.message || e) + '</div>';
      }
    }

    function renderProps(expData, flowData, ordersData) {
      const el = document.getElementById('props-section');
      // /player-exposure shape (from getPlayerExposureSnapshot):
      //   players[]: { key, sport, playerName, propTypes[], risk, pending, total, parlayCount }
      const players = (expData && expData.players) || [];
      const capsBySport = (expData && expData.capsBySport) || {};
      const capDefault = (expData && expData.capDefault) || 0;
      const flow = (flowData && flowData.flow) || [];
      const flowBySport = (flowData && flowData.bySport) || {};
      const flowByPropType = (flowData && flowData.byPropType) || {};
      const allOrders = (ordersData && ordersData.recentOrders) || [];

      const fmtMoney = (v) => '$' + Math.round(v).toLocaleString();
      const capCls = (pct) => pct >= 90 ? 'danger' : pct >= 70 ? 'warn' : '';

      // Pull confirmed prop parlays from the order buffer
      const propParlays = allOrders.filter(o => {
        if (o.status !== 'confirmed' && !(o.status || '').startsWith('settled_')) return false;
        if (o.meta && o.meta.phantom) return false;
        const legs = o.legs || (o.meta && o.meta.legs) || [];
        return legs.some(l => /^player_/.test((l.marketType || '').toLowerCase()));
      }).sort((a, b) => (b.confirmedAt || '').localeCompare(a.confirmedAt || ''));

      let html = '';

      // ---- Caps + summary ----
      const totalRisk = players.reduce((s, p) => s + (p.total || p.risk || 0), 0);
      html += '<div class="data-card"><h3>Caps · summary</h3>';
      html += `<div class="row"><span class="label">Players with active exposure</span><span class="value">${players.length}</span></div>`;
      html += `<div class="row"><span class="label">Total prop risk</span><span class="value">${fmtMoney(totalRisk)}</span></div>`;
      html += `<div class="row"><span class="label">Default cap / player</span><span class="value">${fmtMoney(capDefault)}</span></div>`;
      for (const [sport, cap] of Object.entries(capsBySport)) {
        const lbl = { basketball_nba: 'NBA', icehockey_nhl: 'NHL', baseball_mlb: 'MLB' }[sport] || sport;
        html += `<div class="row"><span class="label">${lbl} cap / player</span><span class="value">${fmtMoney(cap)}</span></div>`;
      }
      html += '</div>';

      // ---- Active per-player exposure (when populated) ----
      if (players.length > 0) {
        const bySport = {};
        for (const p of players) {
          const sport = p.sport || 'unknown';
          if (!bySport[sport]) bySport[sport] = [];
          bySport[sport].push(p);
        }
        for (const [sport, list] of Object.entries(bySport)) {
          list.sort((a, b) => (b.total || b.risk || 0) - (a.total || a.risk || 0));
          const cap = capsBySport[sport] || capDefault;
          const sportLabel = { basketball_nba: 'NBA', icehockey_nhl: 'NHL', baseball_mlb: 'MLB' }[sport] || sport;
          html += `<div class="data-card"><h3>${sportLabel} · ${list.length} player${list.length === 1 ? '' : 's'} active</h3>`;
          for (const p of list) {
            const risk = p.total || p.risk || 0;
            const pending = p.pending || 0;
            const pct = cap > 0 ? Math.min(100, (risk / cap) * 100) : 0;
            const cls = capCls(pct);
            const propTypesStr = (p.propTypes && p.propTypes.length) ? p.propTypes.join(' · ') : '';
            const pendingStr = pending > 0 ? ' (pending ' + fmtMoney(pending) + ')' : '';
            html += `<div class="row"><span class="label">${escapeHtml(p.playerName || '?')}<div class="sublabel">${fmtMoney(risk)} / ${fmtMoney(cap)}${pendingStr} · ${p.parlayCount || 0} parlay${(p.parlayCount || 0) === 1 ? '' : 's'}${propTypesStr ? ' · ' + propTypesStr : ''}</div></span>`;
            html += `<span class="value ${cls}">${pct.toFixed(0)}%</span></div>`;
            html += `<div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>`;
          }
          html += '</div>';
        }
      } else {
        html += '<div class="data-card"><h3>Active per-player exposure</h3>';
        html += '<div class="empty-mini">No active exposure tracked. Caps reset on each service restart — confirmed prop parlays in Supabase don\'t rehydrate the in-memory map. The flow + activity sections below still reflect real bettor demand and confirmations.</div>';
        html += '</div>';
      }

      // ---- Recent confirmed prop parlays ----
      if (propParlays.length > 0) {
        html += '<div class="data-card"><h3>Confirmed prop parlays · ' + propParlays.length + '</h3>';
        for (const o of propParlays.slice(0, 20)) {
          const legs = o.legs || (o.meta && o.meta.legs) || [];
          const propLeg = legs.find(l => /^player_/.test((l.marketType || '').toLowerCase()));
          const propLabel = propLeg ? `${propLeg.playerName || propLeg.teamName || '?'} ${(propLeg.marketType || '').replace(/^player_/, '')} ${propLeg.selection || ''} ${propLeg.line != null ? propLeg.line : ''}` : '(prop)';
          const stake = o.confirmedStake ? '$' + Math.round(o.confirmedStake).toLocaleString() : '';
          const odds = o.confirmedOdds || o.offeredOdds;
          const oddsStr = odds ? (odds > 0 ? '+' + odds : '' + odds) : '';
          const time = o.confirmedAt ? new Date(o.confirmedAt).toLocaleString('en-US', { timeZone: 'America/New_York', month: 'numeric', day: 'numeric', hour: 'numeric', minute: '2-digit' }) : '';
          const statusPill = o.status === 'confirmed' ? '' : (o.status || '').replace('settled_', '');
          html += `<div class="row"><span class="label">${escapeHtml(propLabel.trim())}<div class="sublabel">${legs.length}-leg ${oddsStr} · ${stake}${statusPill ? ' · ' + statusPill : ''} · ${time}</div></span></div>`;
        }
        html += '</div>';
      }

      // ---- Flow: per-prop-type breakdown ----
      const flowTypeRows = Object.entries(flowByPropType).sort((a, b) => b[1] - a[1]);
      if (flowTypeRows.length > 0) {
        html += '<div class="data-card"><h3>Recent RFQ flow · by prop type</h3>';
        const flowTotal = flowTypeRows.reduce((s, [, n]) => s + n, 0);
        for (const [propType, count] of flowTypeRows) {
          const pct = flowTotal > 0 ? Math.round(count / flowTotal * 100) : 0;
          html += `<div class="row"><span class="label">${escapeHtml(propType || '(unclassified)')}<div class="sublabel">${count} of ${flowTotal} (${pct}%)</div></span><span class="value">${count}</span></div>`;
          html += `<div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>`;
        }
        html += '</div>';
      }

      // ---- Flow: per-sport breakdown ----
      const flowSportRows = Object.entries(flowBySport).sort((a, b) => b[1] - a[1]);
      if (flowSportRows.length > 0) {
        html += '<div class="data-card"><h3>Recent RFQ flow · by sport</h3>';
        for (const [sport, count] of flowSportRows) {
          const lbl = { basketball_nba: 'NBA', icehockey_nhl: 'NHL', baseball_mlb: 'MLB', tennis: 'Tennis' }[sport] || sport;
          html += `<div class="row"><span class="label">${lbl}</span><span class="value">${count}</span></div>`;
        }
        html += '</div>';
      }

      // ---- Recent prop legs (last 12 from flow) ----
      if (flow.length > 0) {
        html += '<div class="data-card"><h3>Recent prop RFQs</h3>';
        for (const f of flow.slice(0, 15)) {
          const time = f.time ? new Date(f.time).toLocaleString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit' }) : '';
          const known = f.isKnownEvent ? '' : ' · unknown event';
          html += `<div class="row"><span class="label">${escapeHtml(f.marketName || f.propType || '?')}<div class="sublabel">${escapeHtml(f.eventName || '?')}${f.line != null ? ' · line ' + f.line : ''}${known} · ${time}</div></span></div>`;
        }
        html += '</div>';
      }

      el.innerHTML = html;
    }

    // ===== Tier 2 — Declines tab =====
    // Top decline reasons last 24h with a 7-day mini-trend. Hits
    // /decline-stats?days=7 once per visit; reasons are ranked by
    // last-24h count, sparkline shows trend over the full week.
    let _declinesLastFetch = 0;
    async function loadDeclines() {
      if (Date.now() - _declinesLastFetch < 60000 && document.getElementById('declines-section').dataset.loaded) return;
      _declinesLastFetch = Date.now();
      try {
        const resp = await fetch(BASE + '/decline-stats?days=7');
        const data = await resp.json();
        renderDeclines(data);
        document.getElementById('declines-section').dataset.loaded = '1';
      } catch (e) {
        document.getElementById('declines-section').innerHTML = '<div class="empty">Failed to load: ' + (e.message || e) + '</div>';
      }
    }

    // Per-reason expand state + fetched-event cache. Persists across the
    // page's auto-refresh poll so opened drill-downs don't snap shut.
    const _declineState = {
      openReasons: new Set(),
      eventCache: {}, // reason -> events[] (or 'loading' / 'error')
    };
    let _declineLastPayload = null;

    function _rerenderDeclines() {
      if (_declineLastPayload) renderDeclines(_declineLastPayload);
    }

    window.declineToggleReason = async function(reason) {
      if (_declineState.openReasons.has(reason)) {
        _declineState.openReasons.delete(reason);
        _rerenderDeclines();
        return;
      }
      _declineState.openReasons.add(reason);
      // Cached or in-flight already? Render immediately.
      if (_declineState.eventCache[reason]) {
        _rerenderDeclines();
        return;
      }
      _declineState.eventCache[reason] = 'loading';
      _rerenderDeclines();
      try {
        const r = await fetch(BASE + '/decline-events?reason=' + encodeURIComponent(reason) + '&window=24h&limit=10');
        const data = await r.json();
        _declineState.eventCache[reason] = (data && data.events) || [];
      } catch (e) {
        _declineState.eventCache[reason] = 'error';
      }
      _rerenderDeclines();
    };

    function _formatDeclineEvent(ev) {
      const time = ev.time ? new Date(ev.time).toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit' }) : '';
      const knownLeg = (ev.knownLegs && ev.knownLegs[0]) || null;
      const unknownLeg = (ev.unknownCategories && ev.unknownCategories[0]) || null;
      let label = '';
      let meta = '';
      if (unknownLeg) {
        label = unknownLeg.eventName || unknownLeg.marketName || unknownLeg.category || '?';
        const propTag = unknownLeg.propType ? ' · ' + unknownLeg.propType : '';
        const lineTag = unknownLeg.line != null ? ' · line ' + unknownLeg.line : '';
        meta = `${unknownLeg.category || '?'}${propTag}${lineTag}`;
      } else if (knownLeg) {
        label = knownLeg.eventName || knownLeg.teamName || '?';
        meta = `${knownLeg.marketType || '?'} ${knownLeg.line != null ? knownLeg.line : ''}`;
      } else {
        label = ev.detail || '?';
        meta = '';
      }
      return `<div class="leg-line"><span class="leg-name">${escapeHtml(label)}</span><span class="leg-meta">${escapeHtml(meta)} · ${time}</span></div>`;
    }

    function _renderDeclineDrilldown(reason) {
      const cached = _declineState.eventCache[reason];
      if (cached === 'loading' || cached === undefined) return '<div class="row-detail open"><div class="empty-mini">Loading…</div></div>';
      if (cached === 'error') return '<div class="row-detail open"><div class="empty-mini" style="color:var(--red);">Failed to load events.</div></div>';
      if (!Array.isArray(cached) || cached.length === 0) return '<div class="row-detail open"><div class="empty-mini">No recent events for this reason in the in-memory log (max 5000 entries / 24h window).</div></div>';
      return '<div class="row-detail open">' + cached.map(_formatDeclineEvent).join('') + '</div>';
    }

    function renderDeclines(data) {
      _declineLastPayload = data;
      const el = document.getElementById('declines-section');
      const byReasonByDay = data.byReasonByDay || {};
      const reasons = Object.keys(byReasonByDay);
      const days = []; // last 7 ET dates ascending
      for (let i = 6; i >= 0; i--) {
        const d = new Date(Date.now() - i * 86400000);
        days.push(d.toLocaleDateString('en-CA', { timeZone: 'America/New_York' }));
      }

      const rows = reasons.map(reason => {
        const series = days.map(d => byReasonByDay[reason][d] || 0);
        const today = series[series.length - 1];
        const weekTotal = series.reduce((a, b) => a + b, 0);
        return { reason, today, weekTotal, series };
      }).filter(r => r.weekTotal > 0)
        .sort((a, b) => b.today - a.today || b.weekTotal - a.weekTotal);

      let html = '';
      const totalToday = rows.reduce((s, r) => s + r.today, 0);
      const totalWeek = rows.reduce((s, r) => s + r.weekTotal, 0);

      html += '<div class="data-card"><h3>Last 24h</h3>';
      html += `<div class="row"><span class="label">Total declines today</span><span class="value">${totalToday.toLocaleString()}</span></div>`;
      html += `<div class="row"><span class="label">Total last 7 days</span><span class="value">${totalWeek.toLocaleString()}</span></div>`;
      html += '</div>';

      if (rows.length === 0) {
        html += '<div class="empty">No declines recorded — service may be paused or DB unavailable.</div>';
        el.innerHTML = html;
        return;
      }

      html += '<div class="data-card"><h3>Top reasons (today) · tap to drill in</h3>';
      for (const r of rows.slice(0, 15)) {
        const sparkSvg = sparkline(r.series, 60, 16);
        const isOpen = _declineState.openReasons.has(r.reason);
        const safeReason = r.reason.replace(/'/g, '&#39;');
        html += `<div class="row expandable ${isOpen ? 'open' : ''}" onclick="declineToggleReason('${safeReason}')">`;
        html += `<span class="label"><span class="caret-mini">▶</span>${escapeHtml(r.reason)}<div class="sublabel">${r.weekTotal.toLocaleString()} in 7d</div></span>`;
        html += `<span class="value">${r.today.toLocaleString()} <span class="spark">${sparkSvg}</span></span></div>`;
        if (isOpen) html += _renderDeclineDrilldown(r.reason);
      }
      html += '</div>';

      el.innerHTML = html;
    }

    // Sparkline helper — tiny inline SVG bar/line for trend visualization.
    function sparkline(series, w, h) {
      if (!series || series.length === 0) return '';
      const max = Math.max(1, ...series);
      const barW = w / series.length;
      let svg = `<svg width="${w}" height="${h}" viewBox="0 0 ${w} ${h}" style="vertical-align:middle;">`;
      for (let i = 0; i < series.length; i++) {
        const v = series[i];
        const bh = (v / max) * (h - 2);
        const x = i * barW;
        const y = h - bh;
        const isToday = i === series.length - 1;
        svg += `<rect x="${x + 0.5}" y="${y}" width="${Math.max(1, barW - 1)}" height="${Math.max(1, bh)}" fill="${isToday ? 'var(--accent)' : 'var(--text2)'}" opacity="${isToday ? '1' : '0.5'}"/>`;
      }
      svg += '</svg>';
      return svg;
    }

    // ===== Tier 2 — Settings tab =====
    // Per-category notification mute toggles persisted via IndexedDB
    // (so the SW can read them at push-event time without a chat-server
    // round-trip). Also exposes a "Send test notification" button per
    // category for hands-on verification.
    const PREF_DB = 'sw-prefs';
    const PREF_STORE = 'mutes';
    function openPrefDb() {
      return new Promise((resolve, reject) => {
        const req = indexedDB.open(PREF_DB, 1);
        req.onupgradeneeded = () => {
          const db = req.result;
          if (!db.objectStoreNames.contains(PREF_STORE)) db.createObjectStore(PREF_STORE);
        };
        req.onsuccess = () => resolve(req.result);
        req.onerror = () => reject(req.error);
      });
    }
    async function getMute(category) {
      try {
        const db = await openPrefDb();
        return await new Promise(resolve => {
          const tx = db.transaction(PREF_STORE, 'readonly');
          const req = tx.objectStore(PREF_STORE).get(category);
          req.onsuccess = () => resolve(req.result === true);
          req.onerror = () => resolve(false);
        });
      } catch { return false; }
    }
    async function setMute(category, value) {
      try {
        const db = await openPrefDb();
        return await new Promise(resolve => {
          const tx = db.transaction(PREF_STORE, 'readwrite');
          const req = tx.objectStore(PREF_STORE).put(value === true, category);
          req.onsuccess = () => resolve(true);
          req.onerror = () => resolve(false);
        });
      } catch { return false; }
    }

    async function renderSettings() {
      const el = document.getElementById('settings-section');
      // Prefetch all current mute states
      const states = {};
      for (const c of NOTIFY_CATEGORIES) {
        states[c.key] = await getMute(c.key);
      }

      // Push status from server
      let pushStatus = null;
      try {
        const r = await fetch(BASE + '/push/status');
        pushStatus = await r.json();
      } catch {}

      let html = '';
      html += '<div class="data-card"><h3>Notification status</h3>';
      const perm = ('Notification' in window) ? Notification.permission : 'unsupported';
      html += `<div class="row"><span class="label">Browser permission</span><span class="value">${perm}</span></div>`;
      html += `<div class="row"><span class="label">Subscribed on this device</span><span class="value">${pushSubscribed ? 'yes' : 'no'}</span></div>`;
      if (pushStatus) html += `<div class="row"><span class="label">Server subscriptions</span><span class="value">${pushStatus.subscriptions || 0}</span></div>`;
      html += '</div>';

      html += '<div class="data-card"><h3>Categories</h3>';
      for (const c of NOTIFY_CATEGORIES) {
        const checked = !states[c.key] ? 'checked' : '';
        html += `<div class="row">
          <span class="label">${c.label}<div class="sublabel">${c.desc}</div></span>
          <label class="toggle"><input type="checkbox" ${checked} onchange="onMuteToggle('${c.key}', !this.checked)"><span class="slider"></span></label>
        </div>`;
      }
      html += '</div>';

      html += '<div class="data-card"><h3>Test notifications</h3>';
      html += '<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">';
      for (const c of NOTIFY_CATEGORIES) {
        html += `<button class="sport-chip" style="text-align:center;padding:8px 6px;" onclick="sendTestNotification('${c.key}')">${c.label}</button>`;
      }
      html += '</div></div>';

      html += '<div class="data-card"><h3>About</h3>';
      html += `<div class="row"><span class="label">Open web dashboard</span><span class="value"><a href="${BASE}" target="_blank" rel="noopener" style="color:var(--accent);">→</a></span></div>`;
      html += `<div class="row"><span class="label">Reload service worker</span><span class="value"><a href="javascript:reloadSW()" style="color:var(--accent);">↻</a></span></div>`;
      html += '</div>';

      el.innerHTML = html;
    }
    window.onMuteToggle = async function(key, mute) {
      await setMute(key, mute === true);
      // Push the updated mute list to the server. The server is the
      // authoritative gate now — relying solely on the SW-side check
      // was unreliable across SW versions and iOS PWA update cadences.
      await syncMutePrefsToServer();
    };
    // POST the current mute set + this device's subscription endpoint
    // so the server skips sending pushes for muted categories. Called
    // after every toggle and once at app boot to handle restarts that
    // wiped the in-memory state.
    async function syncMutePrefsToServer() {
      try {
        if (!swReg) return;
        const sub = await swReg.pushManager.getSubscription();
        if (!sub) return;
        const muted = [];
        for (const c of NOTIFY_CATEGORIES) {
          if (await getMute(c.key)) muted.push(c.key);
        }
        await fetch(BASE + '/push/mute-prefs', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ endpoint: sub.endpoint, mutedCategories: muted }),
        });
      } catch (e) {
        console.warn('mute-prefs sync failed:', e);
      }
    }
    window.sendTestNotification = async function(category) {
      try {
        const r = await fetch(BASE + '/push/test?category=' + encodeURIComponent(category), { method: 'POST' });
        const j = await r.json();
        console.log('test sent', j);
      } catch (e) {
        alert('Test send failed: ' + e.message);
      }
    };
    window.reloadSW = async function() {
      if (!swReg) return;
      try {
        await swReg.update();
        alert('Service worker reload requested. Reload the app.');
      } catch (e) { alert('SW reload failed: ' + e.message); }
    };

    // --- Init ---
    applyCollapsibleState();
    initServiceWorker();
    loadData();
    setInterval(loadData, 60000);
    // Pick up screen from URL hash or last-saved preference
    try {
      const fromHash = (location.hash || '').replace('#', '').toLowerCase();
      const saved = localStorage.getItem('pxsp_active_screen');
      const initial = (fromHash && document.getElementById('screen-' + fromHash)) ? fromHash
        : (saved && document.getElementById('screen-' + saved)) ? saved : 'home';
      if (initial !== 'home') switchScreen(initial);
    } catch {}
  </script>
</body>
</html>
