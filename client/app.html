<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#0d1117">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="/app/manifest.json">
  <title>Parlay SP</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #1c2129;
      --border: #30363d;
      --text: #e6edf3;
      --text2: #8b949e;
      --accent: #58a6ff;
      --green: #3fb950;
      --red: #f85149;
      --amber: #f5b942;
      --tab-bar-h: 56px;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: env(safe-area-inset-top) 0 calc(env(safe-area-inset-bottom) + var(--tab-bar-h));
      font-size: 15px;
    }
    /* Reusable collapsible-section pattern. Used for the hourly-fills card,
       Daily Volume, and per-card sub-sections in Exposure/Props/Declines.
       The header always shows a caret + label + optional badge; clicking
       toggles the body via .collapsed class. State persists in localStorage
       per section id so collapse choices survive auto-refresh and tab swap. */
    .collapsible { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; margin: 0 12px 10px; overflow: hidden; }
    .collapsible .header {
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 12px; cursor: pointer; user-select: none;
      background: var(--surface);
    }
    .collapsible .header:active { background: var(--surface2); }
    .collapsible .header .title {
      font-size: 12px; color: var(--text2); text-transform: uppercase;
      letter-spacing: 0.4px; font-weight: 600; display: flex; align-items: center; gap: 6px;
    }
    .collapsible .header .badge {
      font-size: 13px; font-weight: 600; color: var(--text);
    }
    .collapsible .header .caret {
      display: inline-block; width: 12px; font-size: 11px;
      color: var(--text2); transition: transform 0.15s;
    }
    .collapsible.collapsed .caret { transform: rotate(-90deg); }
    .collapsible .body { padding: 8px 12px 12px; border-top: 1px solid var(--border); }
    .collapsible.collapsed .body { display: none; }

    .header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .header h1 { font-size: 18px; font-weight: 600; }
    .header .status {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 12px;
      background: var(--surface2);
    }
    .header .status.connected { color: var(--green); border: 1px solid var(--green); }
    .header .status.disconnected { color: var(--red); border: 1px solid var(--red); }

    .summary {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 6px;
      padding: 8px 12px;
    }
    .summary.collapsed { display: none; }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      min-width: 0;
    }
    .stat-card .label {
      font-size: 11px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stat-card .value {
      font-size: 17px;
      font-weight: 600;
      margin-top: 2px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .stat-card .value.positive { color: var(--green); }
    .stat-card .value.negative { color: var(--red); }

    .summary-peek {
      display: none;
      padding: 8px 12px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      font-size: 13px;
      gap: 12px;
      color: var(--text2);
      justify-content: space-around;
    }
    .summary-peek.visible { display: flex; }
    .summary-peek .item { display: flex; align-items: baseline; gap: 4px; }
    .summary-peek .item strong { color: var(--text); font-size: 14px; font-weight: 600; }
    .summary-peek .item strong.positive { color: var(--green); }
    .summary-peek .item strong.negative { color: var(--red); }

    .stats-toggle {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 4px;
      padding: 5px 10px;
      font-size: 12px;
      cursor: pointer;
      margin-left: 8px;
    }
    .stats-toggle:active { background: var(--surface); }

    .section-title {
      font-size: 13px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 12px 16px 6px;
    }

    .parlay-list { padding: 0 12px 24px; }
    .parlay-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 8px;
      overflow: hidden;
      cursor: pointer;
      transition: border-color 0.15s;
    }
    .parlay-card:active { border-color: var(--accent); }
    .parlay-card .card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 12px;
    }
    .parlay-card .odds { font-size: 16px; font-weight: 600; }
    .parlay-card .result {
      font-size: 11px;
      font-weight: 600;
      padding: 3px 8px;
      border-radius: 4px;
      text-transform: uppercase;
    }
    .parlay-card .result.won { background: rgba(63, 185, 80, 0.15); color: var(--green); }
    .parlay-card .result.lost { background: rgba(248, 81, 73, 0.15); color: var(--red); }
    .parlay-card .result.push { background: rgba(139, 148, 158, 0.15); color: var(--text2); }
    .parlay-card .result.confirmed { background: rgba(88, 166, 255, 0.15); color: var(--accent); }

    .notify-banner {
      margin: 12px 16px;
      padding: 12px;
      background: var(--surface);
      border: 1px solid var(--accent);
      border-radius: 8px;
      font-size: 13px;
      text-align: center;
      cursor: pointer;
    }
    .notify-banner:active { background: var(--surface2); }

    .empty { text-align: center; padding: 40px 16px; color: var(--text2); font-size: 15px; }

    /* Tabbed parlays table (Open / Settled) */
    .tab-bar {
      display: flex;
      gap: 4px;
      padding: 4px 12px 0;
      background: var(--bg);
      position: sticky;
      top: 64px;
      z-index: 5;
    }
    .tab-btn {
      flex: 1;
      padding: 12px 12px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 8px 8px 0 0;
      color: var(--text2);
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tab-btn .count {
      display: inline-block;
      margin-left: 6px;
      padding: 1px 7px;
      border-radius: 8px;
      background: var(--surface2);
      font-size: 12px;
      color: var(--text2);
      font-weight: 500;
    }
    .tab-btn.active {
      background: var(--surface);
      color: var(--text);
      border-color: var(--accent);
      border-bottom: 2px solid var(--surface);
    }
    .tab-btn.active .count { background: var(--accent); color: #fff; }
    .tab-btn:not(.active):active { background: var(--surface2); }

    /* Sport filter chips above parlay list */
    .sport-filter {
      display: flex;
      gap: 6px;
      padding: 8px 12px 4px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    .sport-filter::-webkit-scrollbar { display: none; }
    .sport-chip {
      flex: 0 0 auto;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 5px 12px;
      font-size: 12px;
      color: var(--text2);
      cursor: pointer;
      white-space: nowrap;
    }
    .sport-chip.active {
      background: var(--accent);
      color: #fff;
      border-color: var(--accent);
    }

    .parlay-table-wrap {
      padding: 0 12px 16px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 0 0 8px 8px;
      margin: 0 12px 12px;
      max-height: 65vh;
      overflow-y: auto;
    }
    .parlay-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 4px 12px;
      padding: 10px 8px;
      border-top: 1px solid var(--border);
      cursor: pointer;
      align-items: center;
    }
    .parlay-row:first-child { border-top: none; }
    .parlay-row:active { background: var(--surface2); }
    .parlay-row .main { min-width: 0; display: flex; flex-direction: column; gap: 3px; }
    .parlay-row .selections { font-size: 14px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .parlay-row .meta { font-size: 12px; color: var(--text2); display: flex; gap: 8px; flex-wrap: wrap; }
    .parlay-row .meta .sep { color: var(--border); }
    .parlay-row .right { text-align: right; display: flex; flex-direction: column; align-items: flex-end; gap: 2px; white-space: nowrap; }
    .parlay-row .odds { font-size: 16px; font-weight: 600; }
    .parlay-row .pnl { font-size: 13px; font-weight: 600; }
    .parlay-row .pnl.positive { color: var(--green); }
    .parlay-row .pnl.negative { color: var(--red); }
    .parlay-row .pill {
      font-size: 11px;
      padding: 2px 7px;
      border-radius: 4px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .parlay-row .pill.won { background: rgba(63,185,80,0.15); color: var(--green); }
    .parlay-row .pill.lost { background: rgba(248,81,73,0.15); color: var(--red); }
    .parlay-row .pill.push { background: rgba(139,148,158,0.15); color: var(--text2); }
    .parlay-row .pill.confirmed { background: rgba(88,166,255,0.15); color: var(--accent); }
    .parlay-row .pill.upcoming { background: rgba(139,148,158,0.15); color: var(--text2); }
    .parlay-row.expanded { background: var(--surface2); }
    .parlay-detail { padding: 0 8px 10px; font-size: 13px; background: var(--surface2); border-top: 1px solid var(--border); }
    .parlay-detail .leg-item { display: flex; justify-content: space-between; padding: 4px 0; border-top: 1px solid var(--border); color: var(--text2); }
    .parlay-detail .leg-item:first-child { border-top: none; padding-top: 6px; }
    .parlay-detail .leg-item .leg-name { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; margin-right: 8px; }
    .parlay-detail .leg-item .leg-status { font-size: 11px; font-weight: 600; padding: 1px 6px; border-radius: 3px; }
    .parlay-detail .leg-item .leg-status.won { background: rgba(63,185,80,0.15); color: var(--green); }
    .parlay-detail .leg-item .leg-status.lost { background: rgba(248,81,73,0.15); color: var(--red); }
    .parlay-detail .footer { display: flex; justify-content: space-between; padding-top: 6px; margin-top: 6px; border-top: 1px solid var(--border); color: var(--text2); }
    .parlay-detail .footer a { color: var(--accent); text-decoration: none; }

    /* Daily Volume & P&L section */
    .dv-wrap { padding: 0 12px 16px; }
    .dv-card { background: var(--surface); border: 1px solid var(--border); border-radius: 8px; overflow: hidden; }
    .dv-chart { padding: 8px 4px 4px; }
    .dv-chart svg { width: 100%; height: auto; display: block; }
    .dv-table { width: 100%; border-collapse: collapse; font-size: 13px; }
    .dv-table th { text-align: left; padding: 7px 10px; font-size: 11px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.3px; border-bottom: 1px solid var(--border); font-weight: 500; }
    .dv-table th.r { text-align: right; }
    .dv-table td { padding: 6px 10px; border-top: 1px solid var(--border); }
    .dv-table td.r { text-align: right; font-variant-numeric: tabular-nums; }
    .dv-table td.c { text-align: center; }
    .dv-table .dv-month-row { cursor: pointer; font-weight: 600; background: var(--surface); }
    .dv-table .dv-day-row { cursor: pointer; background: var(--surface2); }
    .dv-table .dv-parlay-row { background: var(--surface2); font-size: 12px; }
    .dv-table td.pos { color: var(--green); }
    .dv-table td.neg { color: var(--red); }
    .dv-table .dv-month-row td:first-child { padding-left: 10px; }
    .dv-table .dv-day-row td:first-child { padding-left: 22px; }
    .dv-table .dv-parlay-row td:first-child { padding-left: 34px; }
    .dv-table .dv-header-row { background: var(--surface); }
    .dv-table .dv-sub-header { background: var(--surface); }
    .dv-table .dv-sub-header th { font-size: 10px; padding: 5px 6px; }
    .dv-caret { display: inline-block; width: 10px; font-size: 9px; color: var(--text2); }
    .dv-section-title { font-size: 14px; color: var(--text2); text-transform: uppercase; letter-spacing: 0.5px; padding: 12px 16px 6px; }
    .dv-legend { display: flex; gap: 12px; padding: 6px 12px 10px; font-size: 11px; color: var(--text2); flex-wrap: wrap; }
    .dv-legend .swatch { display: inline-block; width: 10px; height: 10px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }

    .refresh-btn {
      position: fixed;
      bottom: calc(env(safe-area-inset-bottom) + var(--tab-bar-h) + 12px);
      right: 16px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--accent);
      color: #fff;
      border: none;
      font-size: 18px;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    .refresh-btn:active { opacity: 0.8; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .refresh-btn.loading { animation: spin 1s linear infinite; }

    /* Bottom navigation tab bar */
    .nav-bar {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      height: var(--tab-bar-h);
      padding-bottom: env(safe-area-inset-bottom);
      background: var(--surface);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 30;
    }
    .nav-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--text2);
      font-size: 11px;
      font-weight: 500;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      cursor: pointer;
      padding: 6px 2px;
      transition: color 0.15s;
      position: relative;
    }
    .nav-btn .icon { font-size: 20px; line-height: 1; }
    .nav-btn.active { color: var(--accent); }
    .nav-btn .badge {
      position: absolute;
      top: 4px;
      right: calc(50% - 18px);
      min-width: 14px;
      height: 14px;
      padding: 0 4px;
      background: var(--red);
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      border-radius: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Screen visibility — only one screen visible at a time. */
    .screen { display: none; }
    .screen.active { display: block; }

    /* Generic data list (Exposure / Props / Declines) */
    .data-section { padding: 8px 12px 16px; }
    .data-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 12px;
      margin-bottom: 8px;
    }
    .data-card .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      padding: 6px 0;
      border-top: 1px solid var(--border);
    }
    .data-card .row:first-of-type { border-top: none; }
    .data-card .row .label {
      font-size: 14px;
      color: var(--text);
      flex: 1;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .data-card .row .label .sublabel {
      font-size: 12px;
      color: var(--text2);
      display: block;
      margin-top: 2px;
    }
    .data-card .row .value {
      font-size: 14px;
      font-weight: 600;
      font-variant-numeric: tabular-nums;
      white-space: nowrap;
    }
    .data-card .row .value.warn { color: var(--amber); }
    .data-card .row .value.danger { color: var(--red); }
    .data-card h3 {
      font-size: 13px;
      color: var(--text2);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 8px;
      font-weight: 600;
    }

    /* Progress bar for cap fill */
    .bar-track {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      margin-top: 4px;
    }
    .bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 2px;
      transition: width 0.3s;
    }
    .bar-fill.warn { background: var(--amber); }
    .bar-fill.danger { background: var(--red); }

    /* Sparkline mini chart (declines tab) */
    .spark { display: inline-block; vertical-align: middle; margin-left: 8px; }

    /* Expandable list rows used by Exposure (game/team) and Declines.
       Click on .row.expandable opens a sibling .row-detail underneath. */
    .data-card .row.expandable { cursor: pointer; padding: 8px 0; }
    .data-card .row.expandable:active { background: var(--surface2); }
    .data-card .row .label .caret-mini {
      display: inline-block; width: 10px; font-size: 9px;
      color: var(--text2); transition: transform 0.15s; margin-right: 4px;
    }
    .data-card .row.open .label .caret-mini { transform: rotate(90deg); }
    .data-card .row-detail {
      padding: 6px 4px 10px 18px;
      border-top: 1px dashed var(--border);
      font-size: 12px;
      color: var(--text2);
      display: none;
    }
    .data-card .row-detail.open { display: block; }
    .data-card .row-detail .leg-line {
      display: flex; justify-content: space-between;
      padding: 4px 0; border-bottom: 1px dotted var(--border);
    }
    .data-card .row-detail .leg-line:last-child { border-bottom: none; }
    .data-card .row-detail .leg-line .leg-name {
      flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis;
      white-space: nowrap; color: var(--text);
    }
    .data-card .row-detail .leg-line .leg-meta {
      flex: 0 0 auto; font-variant-numeric: tabular-nums;
      color: var(--text2); margin-left: 8px;
    }
    .data-card .row-detail .empty-mini { padding: 6px 0; color: var(--text2); font-size: 12px; }
    .data-card .row-detail.loading { color: var(--text2); font-style: italic; padding: 6px 0; }

    /* Sort + filter toolbar above each data section */
    .toolbar {
      display: flex; gap: 6px; align-items: center;
      padding: 8px 0 10px;
      flex-wrap: wrap;
    }
    .toolbar input[type=text] {
      flex: 1 1 130px; min-width: 110px;
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 10px;
      font-size: 13px;
    }
    .toolbar input[type=text]:focus { outline: none; border-color: var(--accent); }
    .toolbar select {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 13px;
    }
    .toolbar .clear-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      color: var(--text2);
      border-radius: 6px;
      padding: 6px 8px;
      font-size: 12px;
      cursor: pointer;
    }

    /* Toggle switch (settings) */
    .toggle {
      position: relative;
      display: inline-block;
      width: 38px;
      height: 22px;
      flex-shrink: 0;
    }
    .toggle input { opacity: 0; width: 0; height: 0; }
    .toggle .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background: var(--border);
      transition: 0.2s;
      border-radius: 22px;
    }
    .toggle .slider::before {
      position: absolute;
      content: "";
      height: 16px;
      width: 16px;
      left: 3px;
      bottom: 3px;
      background: var(--text);
      transition: 0.2s;
      border-radius: 50%;
    }
    .toggle input:checked + .slider { background: var(--accent); }
    .toggle input:checked + .slider::before { transform: translateX(16px); }

    /* Pull-to-refresh indicator */
    .ptr-indicator {
      position: fixed;
      top: env(safe-area-inset-top);
      left: 0; right: 0;
      height: 0;
      background: var(--surface);
      color: var(--accent);
      font-size: 11px;
      text-align: center;
      transition: height 0.15s, padding 0.15s;
      overflow: hidden;
      z-index: 50;
    }
    .ptr-indicator.pulling { height: 32px; padding: 8px 0; border-bottom: 1px solid var(--border); }
    .ptr-indicator.refreshing .icon { animation: spin 1s linear infinite; display: inline-block; }

    /* Inline metric chart (Home: hourly fills sparkline) */
    .metric-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 10px 12px;
      margin: 0 12px 12px;
    }
    .metric-card .metric-header {
      display: flex; justify-content: space-between; align-items: baseline;
      font-size: 12px; color: var(--text2); text-transform: uppercase;
      letter-spacing: 0.4px; margin-bottom: 6px;
    }
    .metric-card .metric-value { font-size: 20px; font-weight: 600; color: var(--text); }
    .metric-card svg { width: 100%; height: auto; display: block; margin-top: 4px; }
  </style>
</head>
<body>
  <div class="ptr-indicator" id="ptr-indicator"><span class="icon">↻</span> <span id="ptr-text">Pull to refresh</span></div>

  <div class="header">
    <h1>Parlay SP</h1>
    <div style="display:flex; align-items:center;">
      <span class="status" id="conn-status">...</span>
      <button class="stats-toggle" id="stats-toggle" onclick="toggleStats()" title="Collapse or expand the stats panel">Hide stats</button>
    </div>
  </div>

  <!-- HOME SCREEN -->
  <section id="screen-home" class="screen active">
    <div class="summary-peek" id="summary-peek"></div>
    <div class="summary" id="summary"></div>

    <div id="notify-prompt"></div>

    <!-- Hourly fills sparkline (Tier 3). Collapsible, default collapsed
         since this is exploratory data not actionable signal. Toggle via
         the chevron in the header; state persists in localStorage. -->
    <div class="collapsible collapsed" id="hourly-metric" data-collapsible-key="hourly">
      <div class="header" onclick="toggleCollapsible('hourly')">
        <span class="title"><span class="caret">&#9660;</span> Fills last 12h</span>
        <span class="badge" id="hourly-total">0</span>
      </div>
      <div class="body">
        <svg id="hourly-spark" viewBox="0 0 240 60" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block;"></svg>
      </div>
    </div>

    <div class="sport-filter" id="sport-filter"></div>
    <div class="tab-bar" id="tab-bar">
      <button class="tab-btn active" data-tab="open" onclick="switchParlayTab('open')">
        Open <span class="count" id="tab-count-open">0</span>
      </button>
      <button class="tab-btn" data-tab="settled" onclick="switchParlayTab('settled')">
        Settled <span class="count" id="tab-count-settled">0</span>
      </button>
    </div>
    <div class="parlay-table-wrap" id="parlay-table-wrap">
      <div class="empty">Loading...</div>
    </div>

    <div class="collapsible" id="daily-volume" data-collapsible-key="daily-volume">
      <div class="header" onclick="toggleCollapsible('daily-volume')">
        <span class="title"><span class="caret">&#9660;</span> Daily Volume &amp; P&amp;L</span>
        <span class="badge" id="daily-volume-total">—</span>
      </div>
      <div class="body" style="padding:0;">
        <div class="dv-card" id="daily-volume-card">
          <div class="empty">Loading...</div>
        </div>
      </div>
    </div>
  </section>

  <!-- EXPOSURE SCREEN -->
  <section id="screen-exposure" class="screen">
    <div class="data-section" id="exposure-section">
      <div class="empty">Loading...</div>
    </div>
  </section>

  <!-- PLAYER PROPS SCREEN -->
  <section id="screen-props" class="screen">
    <div class="data-section" id="props-section">
      <div class="empty">Loading...</div>
    </div>
  </section>

  <!-- DECLINES SCREEN -->
  <section id="screen-declines" class="screen">
    <div class="data-section" id="declines-section">
      <div class="empty">Loading...</div>
    </div>
  </section>

  <!-- SETTINGS SCREEN -->
  <section id="screen-settings" class="screen">
    <div class="data-section" id="settings-section">
      <!-- Populated by renderSettings() -->
    </div>
  </section>

  <button class="refresh-btn" id="refresh-btn" onclick="manualRefresh()">&#8635;</button>

  <!-- Bottom nav tab bar -->
  <nav class="nav-bar" id="nav-bar">
    <button class="nav-btn active" data-screen="home" onclick="switchScreen('home')">
      <span class="icon">⌂</span><span>Home</span>
    </button>
    <button class="nav-btn" data-screen="exposure" onclick="switchScreen('exposure')">
      <span class="icon">⊞</span><span>Exposure</span>
    </button>
    <button class="nav-btn" data-screen="props" onclick="switchScreen('props')">
      <span class="icon">◉</span><span>Props</span>
    </button>
    <button class="nav-btn" data-screen="declines" onclick="switchScreen('declines')">
      <span class="icon">⊘</span><span>Declines</span>
    </button>
    <button class="nav-btn" data-screen="settings" onclick="switchScreen('settings')">
      <span class="icon">⚙</span><span>Settings</span>
    </button>
  </nav>

  <script>
    const BASE = location.origin;
    const DASHBOARD_URL = BASE;

    // Notification categories the SW understands. Each is independently
    // muteable in Settings — flip toggles persist via IndexedDB so the SW
    // can read them without a round-trip.
    const NOTIFY_CATEGORIES = [
      { key: 'confirmation', label: 'Parlay confirmed',  desc: 'New parlay accepted' },
      { key: 'settlement',   label: 'Parlay settled',    desc: 'Won/Lost/Push' },
      { key: 'cap_hit',      label: 'Exposure cap hit',  desc: 'Team / player / game / portfolio' },
      { key: 'connection',   label: 'Connection state',  desc: 'Disconnect / reconnect / pause' },
      { key: 'daily_summary',label: 'Daily summary',     desc: 'End-of-day P&L wrap' },
    ];

    // --- Service Worker / Push subscription ---
    let swReg = null;
    let pushSubscribed = false;

    async function initServiceWorker() {
      if (!('serviceWorker' in navigator)) return;
      try {
        swReg = await navigator.serviceWorker.register('/app/sw.js');
        console.log('SW registered');
        // SW posts navigate messages on notification click
        navigator.serviceWorker.addEventListener('message', (e) => {
          if (e.data && e.data.type === 'navigate' && e.data.url) {
            const hash = (e.data.url.split('#')[1] || '').toLowerCase();
            if (hash && document.getElementById('screen-' + hash)) switchScreen(hash);
          }
        });
        checkPushSubscription();
      } catch (e) {
        console.error('SW registration failed:', e);
      }
    }

    async function checkPushSubscription() {
      if (!swReg) return;
      let sub = await swReg.pushManager.getSubscription();

      // Self-heal: if browser has no subscription but Notification.permission
      // is already granted, silently re-subscribe. Handles the case where
      // the browser dropped the subscription (PWA reinstall, sw update, etc.)
      // without forcing the user to tap a banner.
      if (!sub && 'Notification' in window && Notification.permission === 'granted') {
        try {
          const resp = await fetch(BASE + '/push/vapid-key');
          const { publicKey } = await resp.json();
          sub = await swReg.pushManager.subscribe({
            userVisibleOnly: true,
            applicationServerKey: urlBase64ToUint8Array(publicKey),
          });
          console.log('Auto-resubscribed to push');
        } catch (e) {
          console.warn('Auto-resubscribe failed:', e);
        }
      }

      pushSubscribed = !!sub;
      renderNotifyPrompt();

      // Re-POST subscription on every load. The server keeps subscriptions
      // in memory only — every redeploy forgets them, but the browser-side
      // subscription persists and we just push it back up each time.
      // Include the current mute prefs so the server has the right gate
      // immediately after a restart (no race window where muted categories
      // could leak through before the user reopens Settings).
      if (sub) {
        try {
          const muted = [];
          for (const c of NOTIFY_CATEGORIES) {
            if (await getMute(c.key)) muted.push(c.key);
          }
          const payload = { ...sub.toJSON(), mutedCategories: muted };
          const r = await fetch(BASE + '/push/subscribe', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          });
          await r.json().catch(() => ({}));
        } catch (e) {
          console.warn('Re-register push subscription failed:', e);
        }
      }
    }

    async function subscribePush() {
      if (!swReg) return;
      try {
        const resp = await fetch(BASE + '/push/vapid-key');
        const { publicKey } = await resp.json();
        const sub = await swReg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey),
        });
        await fetch(BASE + '/push/subscribe', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(sub.toJSON()),
        });
        pushSubscribed = true;
        renderNotifyPrompt();
      } catch (e) {
        console.error('Push subscribe failed:', e);
        alert('Could not enable notifications. Check browser permissions.');
      }
    }

    function renderNotifyPrompt() {
      const el = document.getElementById('notify-prompt');
      if (pushSubscribed) {
        el.innerHTML = '';
      } else {
        const perm = ('Notification' in window) ? Notification.permission : 'unsupported';
        let msg = 'Tap to enable push notifications';
        if (perm === 'denied') msg = 'Push notifications BLOCKED — enable in browser settings';
        else if (perm === 'unsupported') msg = 'Push notifications not supported on this browser';
        el.innerHTML = '<div class="notify-banner" onclick="subscribePush()">' + msg + '</div>';
      }
    }

    function urlBase64ToUint8Array(base64String) {
      const padding = '='.repeat((4 - base64String.length % 4) % 4);
      const base64 = (base64String + padding).replace(/-/g, '+').replace(/_/g, '/');
      const rawData = atob(base64);
      const outputArray = new Uint8Array(rawData.length);
      for (let i = 0; i < rawData.length; i++) outputArray[i] = rawData.charCodeAt(i);
      return outputArray;
    }

    // --- Screen / Tab management ---
    let _activeScreen = 'home';
    function switchScreen(name) {
      if (!document.getElementById('screen-' + name)) return;
      _activeScreen = name;
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-' + name).classList.add('active');
      document.querySelectorAll('.nav-btn').forEach(b => b.classList.toggle('active', b.dataset.screen === name));
      // Trigger lazy load of secondary screens — keeps Home fast and
      // defers Exposure / Props / Declines fetches until first view.
      switch (name) {
        case 'exposure': loadExposure(); break;
        case 'props': loadProps(); break;
        case 'declines': loadDeclines(); break;
        case 'settings': renderSettings(); break;
      }
      try { localStorage.setItem('pxsp_active_screen', name); } catch {}
      // Sync URL hash so deep links from notifications work
      try { history.replaceState(null, '', '#' + name); } catch {}
    }
    window.switchScreen = switchScreen;

    // --- Pull-to-refresh ---
    // Touch handling: only triggers when scrollY=0 and user pulls down >70px.
    // Fires manualRefresh() and shows the indicator briefly.
    let _ptrStartY = null;
    let _ptrPulling = false;
    document.addEventListener('touchstart', (e) => {
      if (window.scrollY === 0 && e.touches && e.touches[0]) {
        _ptrStartY = e.touches[0].clientY;
      } else _ptrStartY = null;
    }, { passive: true });
    document.addEventListener('touchmove', (e) => {
      if (_ptrStartY == null) return;
      const dy = e.touches[0].clientY - _ptrStartY;
      const ind = document.getElementById('ptr-indicator');
      if (dy > 30) {
        ind.classList.add('pulling');
        _ptrPulling = true;
        document.getElementById('ptr-text').textContent = dy > 70 ? 'Release to refresh' : 'Pull to refresh';
      } else {
        ind.classList.remove('pulling');
        _ptrPulling = false;
      }
    }, { passive: true });
    document.addEventListener('touchend', () => {
      const ind = document.getElementById('ptr-indicator');
      if (_ptrPulling) {
        ind.classList.add('refreshing');
        document.getElementById('ptr-text').textContent = 'Refreshing…';
        manualRefresh();
        setTimeout(() => {
          ind.classList.remove('refreshing');
          ind.classList.remove('pulling');
        }, 800);
      }
      _ptrStartY = null;
      _ptrPulling = false;
    }, { passive: true });

    // --- Data loading ---
    function manualRefresh() {
      if (navigator.clearAppBadge) navigator.clearAppBadge();
      loadData();
      // Also refresh the currently-visible secondary screen
      switch (_activeScreen) {
        case 'exposure': loadExposure(); break;
        case 'props': loadProps(); break;
        case 'declines': loadDeclines(); break;
      }
    }

    async function loadData() {
      const btn = document.getElementById('refresh-btn');
      btn.classList.add('loading');
      try {
        // /daily-pnl is the SOURCE OF TRUTH for the chart. /orders.recentOrders
        // is bounded (~906 entries) and miss pre-buffer history, which is why
        // the previous mobile chart's cumulative ended at $7k while the
        // dashboard's lifetime stat shows $13k+. /daily-pnl reads directly
        // from Supabase and matches the dashboard's view.
        const [statusResp, ordersResp, pxPnLResp, dailyPnlResp] = await Promise.all([
          fetch(BASE + '/status'),
          fetch(BASE + '/orders'),
          fetch(BASE + '/px-pnl').catch(() => null),
          fetch(BASE + '/daily-pnl?days=30').catch(() => null),
        ]);
        const status = await statusResp.json();
        const ordersData = await ordersResp.json();
        const pxPnL = pxPnLResp ? await pxPnLResp.json().catch(() => null) : null;
        const dailyPnl = dailyPnlResp ? await dailyPnlResp.json().catch(() => null) : null;
        const allOrders = ordersData.recentOrders || [];

        renderStatus(status, allOrders, pxPnL);
        renderHourlyMetric(allOrders);
        renderSportFilter(allOrders);
        renderParlays(allOrders);
        renderDailyVolume(allOrders, dailyPnl);
      } catch (e) {
        console.error('Load failed:', e);
      } finally {
        btn.classList.remove('loading');
      }
    }

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible' && navigator.clearAppBadge) {
        navigator.clearAppBadge();
      }
    });

    function getTodayET() {
      return new Date().toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
    }
    function getTodayCutoffET() {
      const todayStr = getTodayET();
      return new Date(todayStr + 'T10:00:00-04:00');
    }

    function renderStatus(status, allOrders, pxPnL) {
      const o = status.orders || {};
      const p = status.portfolio || {};
      const ws = status.websocket || {};
      const connected = ws.connectionState === 'connected';

      const connEl = document.getElementById('conn-status');
      connEl.textContent = connected ? 'Connected' : (ws.connectionState === 'connecting' ? 'Connecting…' : 'Disconnected');
      connEl.className = 'status ' + (connected ? 'connected' : 'disconnected');

      const pnl = o.runningPnL || 0;
      const pnlCls = pnl >= 0 ? 'positive' : 'negative';
      const deployed = (pxPnL && pxPnL.ok && pxPnL.openExposure != null)
        ? pxPnL.openExposure
        : (p.totalRisk || 0);
      const toWin = p.totalToWin || 0;
      const balance = p.balance || 0;

      const cutoff = getTodayCutoffET();
      const todaySettled = allOrders.filter(ord => {
        if (!ord.status || !ord.status.startsWith('settled_')) return false;
        const t = ord.settledAt ? new Date(ord.settledAt) : null;
        return t && t >= cutoff;
      });
      const dailyPnl = todaySettled.reduce((sum, ord) => sum + (ord.pnl || 0), 0);
      const dailyPnlCls = dailyPnl >= 0 ? 'positive' : 'negative';

      const fmtShort = (v) => {
        const abs = Math.abs(v);
        if (abs >= 1000) return (v < 0 ? '-' : '') + '$' + (abs / 1000).toFixed(1) + 'k';
        return (v < 0 ? '-' : '') + '$' + abs.toFixed(0);
      };
      const openCount = o.activeOrders || 0;
      document.getElementById('summary').innerHTML = `
        <div class="stat-card"><div class="label">P&L</div><div class="value ${pnlCls}">${pnl >= 0 ? '+' : ''}${fmtShort(pnl)}</div></div>
        <div class="stat-card"><div class="label">Daily P&L</div><div class="value ${dailyPnlCls}">${dailyPnl >= 0 ? '+' : ''}${fmtShort(dailyPnl)}</div></div>
        <div class="stat-card"><div class="label">Balance</div><div class="value">${fmtShort(balance)}</div></div>
        <div class="stat-card"><div class="label">Open</div><div class="value">${openCount}</div></div>
        <div class="stat-card"><div class="label">Deployed</div><div class="value">${fmtShort(deployed)}</div></div>
        <div class="stat-card"><div class="label">To Win</div><div class="value" style="color:var(--green);">${fmtShort(toWin)}</div></div>
        <div class="stat-card"><div class="label">Settled Today</div><div class="value">${todaySettled.length}</div></div>
      `;

      document.getElementById('summary-peek').innerHTML =
        `<div class="item"><span>Bal</span><strong>${fmtShort(balance)}</strong></div>`
      + `<div class="item"><span>Open</span><strong>${openCount}</strong></div>`
      + `<div class="item"><span>P&L</span><strong class="${pnlCls}">${pnl >= 0 ? '+' : ''}${fmtShort(pnl)}</strong></div>`
      + `<div class="item"><span>Daily</span><strong class="${dailyPnlCls}">${dailyPnl >= 0 ? '+' : ''}${fmtShort(dailyPnl)}</strong></div>`;
    }

    function applyStatsState(collapsed) {
      const summary = document.getElementById('summary');
      const peek = document.getElementById('summary-peek');
      const toggleBtn = document.getElementById('stats-toggle');
      if (collapsed) {
        summary.classList.add('collapsed');
        peek.classList.add('visible');
        toggleBtn.textContent = 'Show stats';
      } else {
        summary.classList.remove('collapsed');
        peek.classList.remove('visible');
        toggleBtn.textContent = 'Hide stats';
      }
    }
    function toggleStats() {
      const collapsed = !document.getElementById('summary').classList.contains('collapsed');
      try { localStorage.setItem('pxsp_stats_collapsed', collapsed ? '1' : '0'); } catch {}
      applyStatsState(collapsed);
    }
    window.toggleStats = toggleStats;
    try { applyStatsState(localStorage.getItem('pxsp_stats_collapsed') === '1'); } catch {}

    // --- Generic collapsible-section toggle ---
    // Persist open/closed state per-key in localStorage so collapse
    // choices survive auto-refresh, tab swap, and PWA reload.
    function applyCollapsibleState() {
      const els = document.querySelectorAll('.collapsible[data-collapsible-key]');
      for (const el of els) {
        const key = el.dataset.collapsibleKey;
        const stored = localStorage.getItem('pxsp_collapsed_' + key);
        if (stored === '1') el.classList.add('collapsed');
        else if (stored === '0') el.classList.remove('collapsed');
        // Otherwise leave default-collapsed state from HTML (e.g. hourly)
      }
    }
    window.toggleCollapsible = function(key) {
      const el = document.querySelector('.collapsible[data-collapsible-key="' + key + '"]');
      if (!el) return;
      const willCollapse = !el.classList.contains('collapsed');
      el.classList.toggle('collapsed', willCollapse);
      try { localStorage.setItem('pxsp_collapsed_' + key, willCollapse ? '1' : '0'); } catch {}
    };

    // --- Hourly fills sparkline (Tier 3) ---
    // 12-hour rolling bar chart of confirmations, labeled with the
    // ET hour-of-day each bar represents (12a, 1a, …, 11p). Latest
    // hour highlighted in accent color so the right-edge "now" is
    // visually anchored. Lives in a collapsible card that defaults
    // to collapsed — exploratory data, not actionable signal.
    function renderHourlyMetric(allOrders) {
      const el = document.getElementById('hourly-spark');
      const totalEl = document.getElementById('hourly-total');
      if (!el) return;
      const now = new Date();
      const nowHour = now.getHours(); // local browser hour (close enough to ET for the user's device)
      const buckets = new Array(12).fill(0);
      for (const o of allOrders) {
        const ts = o.confirmedAt;
        if (!ts) continue;
        const t = new Date(ts);
        if (isNaN(t.getTime())) continue;
        const hoursAgo = (now - t) / 3600000;
        if (hoursAgo < 0 || hoursAgo > 12) continue;
        const idx = Math.min(11, Math.floor(11 - hoursAgo));
        if (idx >= 0 && idx < 12) buckets[idx]++;
      }
      const total = buckets.reduce((a, b) => a + b, 0);
      totalEl.textContent = total + ' fill' + (total === 1 ? '' : 's');
      const max = Math.max(1, ...buckets);
      const W = 240, H = 60;
      const padBot = 14;            // room for hour labels
      const chartH = H - padBot - 2;
      const slotW = W / 12;
      const barW = slotW - 4;
      let svg = '';
      const fmtHour = (h) => {
        h = ((h % 24) + 24) % 24;
        if (h === 0) return '12a';
        if (h === 12) return '12p';
        return (h <= 12 ? h : h - 12) + (h < 12 ? 'a' : 'p');
      };
      for (let i = 0; i < 12; i++) {
        const h = (buckets[i] / max) * chartH;
        const x = i * slotW + 2;
        const y = chartH - h;
        const isNow = i === 11;
        const color = isNow ? 'var(--accent)' : 'var(--text2)';
        const opacity = isNow ? '1' : '0.55';
        svg += `<rect x="${x}" y="${y}" width="${barW}" height="${Math.max(2, h)}" fill="${color}" opacity="${opacity}" rx="1"/>`;
        // Hour label below each bar; show value count above non-zero bars
        const hourLabel = fmtHour(nowHour - (11 - i));
        svg += `<text x="${x + barW / 2}" y="${H - 3}" text-anchor="middle" font-size="9" fill="var(--text2)">${hourLabel}</text>`;
        if (buckets[i] > 0) {
          svg += `<text x="${x + barW / 2}" y="${y - 1}" text-anchor="middle" font-size="8" fill="var(--text)">${buckets[i]}</text>`;
        }
      }
      el.innerHTML = svg;
    }

    // --- Sport filter chips ---
    let _activeSportFilter = 'all';
    function renderSportFilter(orders) {
      const sportCounts = { all: 0 };
      for (const o of orders) {
        if (o.status !== 'confirmed' && !(o.status || '').startsWith('settled_')) continue;
        if (o.meta && o.meta.phantom) continue;
        sportCounts.all++;
        const legs = o.legs || (o.meta && o.meta.legs) || [];
        const sports = new Set(legs.map(l => l.sport).filter(Boolean));
        for (const s of sports) sportCounts[s] = (sportCounts[s] || 0) + 1;
      }
      const sports = Object.keys(sportCounts).filter(k => k !== 'all').sort((a, b) => sportCounts[b] - sportCounts[a]);
      const labels = { all: 'All', basketball_nba: 'NBA', icehockey_nhl: 'NHL', baseball_mlb: 'MLB', tennis: 'Tennis', soccer: 'Soccer', mma_mixed_martial_arts: 'MMA', golf_matchups: 'Golf', basketball_wnba: 'WNBA', basketball_ncaab: 'NCAAB' };
      const chips = ['all', ...sports].map(s => {
        const lbl = labels[s] || s.replace(/_/g, ' ');
        const cls = s === _activeSportFilter ? 'sport-chip active' : 'sport-chip';
        return `<div class="${cls}" onclick="setSportFilter('${s}')">${lbl} ${sportCounts[s] || 0}</div>`;
      }).join('');
      document.getElementById('sport-filter').innerHTML = chips;
    }
    window.setSportFilter = function(s) {
      _activeSportFilter = s;
      renderSportFilter(_lastOrdersCache);
      renderParlays(_lastOrdersCache);
    };

    // --- Parlay tabs (Open / Settled) ---
    let _activeParlayTab = 'open';
    let _lastOrdersCache = [];
    const _expandedParlays = new Set();

    window.switchParlayTab = function(tab) {
      _activeParlayTab = tab;
      document.querySelectorAll('.tab-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tab === tab);
      });
      renderParlays(_lastOrdersCache);
    };

    window.toggleParlayRow = function(pid) {
      if (_expandedParlays.has(pid)) _expandedParlays.delete(pid);
      else _expandedParlays.add(pid);
      renderParlays(_lastOrdersCache);
    };

    function probToAmerican(p) {
      if (!p || p <= 0 || p >= 1) return '-';
      if (p >= 0.5) return Math.round(-100 * p / (1 - p));
      return '+' + Math.round(100 * (1 - p) / p);
    }
    function fmtOdds(odds) {
      if (odds == null) return '-';
      return odds > 0 ? '+' + odds : '' + odds;
    }
    function calcToWin(stake, odds) {
      if (!stake || !odds) return 0;
      return stake * 100 / Math.abs(odds);
    }

    function parlayMatchesSport(o, sport) {
      if (sport === 'all') return true;
      const legs = o.legs || (o.meta && o.meta.legs) || [];
      return legs.some(l => l.sport === sport);
    }

    function renderParlays(orders) {
      _lastOrdersCache = orders;
      const el = document.getElementById('parlay-table-wrap');

      const all = orders
        .filter(o => o.status === 'confirmed' || (o.status && o.status.startsWith('settled_')))
        .filter(o => o.quotedAt || o.confirmedAt || (o.meta && o.meta.pxBackfill))
        .filter(o => !(o.meta && o.meta.phantom))
        .filter(o => parlayMatchesSport(o, _activeSportFilter));

      const openList = all
        .filter(o => o.status === 'confirmed')
        .sort((a, b) => (b.confirmedAt || b.quotedAt || '').localeCompare(a.confirmedAt || a.quotedAt || ''));

      const settledList = all
        .filter(o => o.status && o.status.startsWith('settled_'))
        .sort((a, b) => (b.settledAt || b.confirmedAt || '').localeCompare(a.settledAt || a.confirmedAt || ''));

      document.getElementById('tab-count-open').textContent = openList.length;
      document.getElementById('tab-count-settled').textContent = settledList.length;

      const list = _activeParlayTab === 'open' ? openList : settledList;

      if (list.length === 0) {
        el.innerHTML = '<div class="empty">No ' + _activeParlayTab + ' parlays</div>';
        return;
      }

      const dashboardUrl = BASE;
      const html = list.map(o => {
        const pid = o.parlayId || '';
        const legs = o.legs || (o.meta && o.meta.legs) || [];
        const odds = o.confirmedOdds || o.offeredOdds;
        const oddsStr = fmtOdds(odds);
        const result = o.settlementResult || (o.status === 'confirmed' ? 'confirmed' : (o.status || '').replace('settled_', ''));
        const pnl = o.pnl;
        const pnlStr = pnl != null ? (pnl >= 0 ? '+$' + pnl.toFixed(2) : '-$' + Math.abs(pnl).toFixed(2)) : null;
        const pnlCls = pnl != null ? (pnl > 0 ? 'positive' : pnl < 0 ? 'negative' : '') : '';
        const stake = o.confirmedStake || 0;
        const toWinAmt = calcToWin(stake, odds);

        const firstNames = legs.slice(0, 3).map(l => {
          const name = l.teamName || l.team || l.selection || l.pxEventName || '?';
          return name.length > 22 ? name.substring(0, 20) + '..' : name;
        }).join(', ');
        const more = legs.length > 3 ? ` +${legs.length - 3}` : '';
        const selections = firstNames + more;

        const tsIso = _activeParlayTab === 'settled' ? (o.settledAt || o.confirmedAt) : (o.confirmedAt || o.quotedAt);
        let timeLabel = '';
        if (tsIso) {
          try {
            const d = new Date(tsIso);
            timeLabel = d.toLocaleString('en-US', { timeZone: 'America/New_York', month: 'numeric', day: 'numeric', hour: 'numeric', minute: '2-digit' });
          } catch { timeLabel = tsIso.substring(5, 16).replace('T', ' '); }
        }

        const expanded = _expandedParlays.has(pid);

        let rightHtml = `<span class="odds">${oddsStr}</span>`;
        if (_activeParlayTab === 'settled' && pnlStr) {
          rightHtml += `<span class="pnl ${pnlCls}">${pnlStr}</span>`;
        } else if (_activeParlayTab === 'open') {
          rightHtml += `<span class="pnl" style="color:var(--green);">$${toWinAmt.toFixed(2)}</span>`;
        }
        const pillCls = result === 'won' ? 'won' : result === 'lost' ? 'lost' : result === 'push' ? 'push' : 'confirmed';
        const pillLabel = result.charAt(0).toUpperCase() + result.slice(1);

        let row = `<div class="parlay-row ${expanded ? 'expanded' : ''}" onclick="toggleParlayRow('${pid}')">
          <div class="main">
            <div class="selections">${selections}</div>
            <div class="meta">
              <span>${legs.length}-leg</span>
              <span class="sep">·</span>
              <span>$${stake.toFixed(2)}</span>
              <span class="sep">·</span>
              <span>${timeLabel}</span>
              <span class="pill ${pillCls}">${pillLabel}</span>
            </div>
          </div>
          <div class="right">${rightHtml}</div>
        </div>`;

        if (expanded) {
          const legItems = legs.map(l => {
            const name = l.teamName || l.team || l.selection || l.pxEventName || '?';
            const displayName = name.length > 40 ? name.substring(0, 38) + '..' : name;
            const lr = l.settlementStatus || l.settlement_status || l.inferredResult || '';
            const lrCls = lr === 'won' ? 'won' : lr === 'lost' ? 'lost' : '';
            const lrLabel = lr ? lr.charAt(0).toUpperCase() + lr.slice(1) : '';
            return `<div class="leg-item">
              <span class="leg-name">${displayName}</span>
              ${lrLabel ? `<span class="leg-status ${lrCls}">${lrLabel}</span>` : ''}
            </div>`;
          }).join('');
          const fairParlayOdds = o.fairParlayProb ? probToAmerican(o.fairParlayProb) : '-';
          row += `<div class="parlay-detail">
            ${legItems}
            <div class="footer">
              <span>Fair ${fairParlayOdds} · Offer ${oddsStr}</span>
              <span>Risk $${stake.toFixed(2)} · Win $${toWinAmt.toFixed(2)}</span>
            </div>
            <div class="footer">
              <a href="${dashboardUrl}" target="_blank" rel="noopener">Open in web dashboard →</a>
            </div>
          </div>`;
        }
        return row;
      }).join('');

      el.innerHTML = html;
    }

    // --- Daily Volume & P&L (chart + month→day→parlay table) ---
    const _dvExpanded = new Set();
    const _dvSort = {};

    function _etDay(iso) {
      if (!iso) return null;
      const d = new Date(iso);
      if (isNaN(d.getTime())) return null;
      return d.toLocaleDateString('en-CA', { timeZone: 'America/New_York' });
    }
    function _fmt$(v) {
      if (v == null || isNaN(v)) return '-';
      const sign = v < 0 ? '-' : '';
      const abs = Math.abs(v);
      if (abs >= 10000) return sign + '$' + Math.round(abs).toLocaleString();
      return sign + '$' + abs.toFixed(2);
    }
    function _fmtPnl(v) {
      if (v == null || isNaN(v)) return '-';
      return (v >= 0 ? '+' : '-') + '$' + Math.abs(v).toFixed(2);
    }
    function _calcSpProfit(stake, americanOdds) {
      if (!stake || !americanOdds) return 0;
      return stake * 100 / Math.abs(americanOdds);
    }
    function _pnlCls(v) { return v > 0 ? 'pos' : v < 0 ? 'neg' : ''; }

    window.toggleDv = function(id) {
      const el = document.getElementById(id);
      if (!el) return;
      const opening = el.style.display === 'none';
      el.style.display = opening ? 'table-row' : 'none';
      if (opening) _dvExpanded.add(id);
      else _dvExpanded.delete(id);
    };

    window.dvSortClick = function(dayId, col) {
      const cur = _dvSort[dayId] || { col: 'time', dir: 1 };
      if (cur.col === col) cur.dir = cur.dir > 0 ? -1 : 1;
      else { cur.col = col; cur.dir = 1; }
      _dvSort[dayId] = cur;
      if (window._dvLastOrders) renderDailyVolume(window._dvLastOrders);
    };

    function renderDailyVolume(allOrders, dailyPnlPayload) {
      const el = document.getElementById('daily-volume-card');
      const totalBadge = document.getElementById('daily-volume-total');
      if (!el) return;
      window._dvLastOrders = allOrders;

      // Drill-down table beneath the chart still uses the in-memory
      // recentOrders buffer (it needs per-parlay rows that /daily-pnl
      // doesn't carry). The chart itself uses the Supabase-backed daily
      // series from /daily-pnl so the cumulative line matches the
      // dashboard's view ($13k+ lifetime, not the partial $7k that the
      // bounded buffer produced before).
      const confirmed = allOrders.filter(o =>
        (o.status === 'confirmed' || (o.status && o.status.startsWith('settled_')))
        && (o.quotedAt || !(o.meta && o.meta.reconstructed))
        && !(o.meta && o.meta.phantom)
      );
      const dailySeries = (dailyPnlPayload && Array.isArray(dailyPnlPayload.daily)) ? dailyPnlPayload.daily : null;
      if (confirmed.length < 1 && (!dailySeries || dailySeries.length === 0)) {
        el.innerHTML = '<div class="empty">Need confirmed orders to show daily activity</div>';
        if (totalBadge) totalBadge.textContent = '—';
        return;
      }

      // Build the in-memory rollup for the drill-down table only.
      const byDay = {};
      for (const o of confirmed) {
        const day = _etDay(o.confirmedAt || o.quotedAt);
        if (!day) continue;
        if (!byDay[day]) byDay[day] = { risk: 0, toWin: 0, pnl: 0, count: 0, settled: 0, orders: [] };
        byDay[day].count++;
        byDay[day].orders.push(o);
        byDay[day].risk += (o.confirmedStake || 0);
        byDay[day].toWin += o.confirmedStake && o.offeredOdds
          ? _calcSpProfit(o.confirmedStake, o.offeredOdds) : 0;
        if (o.pnl != null) { byDay[day].pnl += o.pnl; byDay[day].settled++; }
      }
      // Merge Supabase daily-pnl values into byDay so the in-memory rollup
      // for any pre-buffer day surfaces in the drill-down table too. This
      // keeps the table accurate even when the buffer doesn't contain
      // those days' parlays.
      if (dailySeries) {
        for (const row of dailySeries) {
          const day = row.date;
          if (!byDay[day]) byDay[day] = { risk: 0, toWin: 0, pnl: 0, count: 0, settled: 0, orders: [] };
          // Prefer Supabase values (authoritative) over in-memory aggregate
          if (row.pnl != null) byDay[day].pnl = row.pnl;
          if (row.risk != null) byDay[day].risk = row.risk;
          if (row.fills != null) byDay[day].count = Math.max(byDay[day].count, row.fills);
          if (row.wins != null && row.losses != null) byDay[day].settled = Math.max(byDay[day].settled, row.wins + row.losses + (row.pushes || 0));
        }
      }
      const days = Object.keys(byDay).sort();

      // Chart geometry — bigger overall, taller text so axis/labels are
      // readable next to the 13px table beneath. Was 360×220 with 8/7px
      // text which was visually disproportionate on mobile.
      const W = 360, H = 200, pad = { l: 38, r: 10, t: 14, b: 26 };
      const chartW = W - pad.l - pad.r, chartH = H - pad.t - pad.b;
      const N = Math.min(days.length, 14);
      const chartDays = days.slice(-N);
      const slotW = chartW / Math.max(1, chartDays.length);
      const riskBarW = Math.max(6, slotW * 0.7);
      const pnlBarW  = Math.max(3, riskBarW * 0.45);

      // Cumulative P&L line: prefer Supabase series (gives true lifetime
      // baseline). If we have ALL days from Supabase, the cumul line will
      // match the dashboard's chart. The series may not include the FULL
      // history (default 30d window), so we still show whatever we got.
      const cumul = [];
      let running = 0;
      for (const day of chartDays) { running += (byDay[day].pnl || 0); cumul.push(running); }

      const maxRisk = Math.max(0, ...chartDays.map(d => byDay[d].risk));
      const maxPnlPos = Math.max(0, ...chartDays.map(d => byDay[d].pnl));
      const minPnlNeg = Math.min(0, ...chartDays.map(d => byDay[d].pnl));
      const maxCumul = Math.max(0, ...cumul);
      const minCumul = Math.min(0, ...cumul);
      let yMax = Math.max(1, maxRisk, maxPnlPos, maxCumul);
      let yMin = Math.min(0, minPnlNeg, minCumul);

      // Snap y-bounds to the next whole $1k so axis ticks land on round
      // values. Avoids "$7,413 / -$6,222" labels — produces "$8k / -$7k"
      // instead. Min step = $1k so very small ranges still show 0/1k.
      const ceilK = (v) => Math.ceil(v / 1000) * 1000;
      const floorK = (v) => Math.floor(v / 1000) * 1000;
      yMax = Math.max(1000, ceilK(yMax));
      yMin = Math.min(0, floorK(yMin));
      const yRange = yMax - yMin || 1;
      const scaleY = (v) => pad.t + ((yMax - v) / yRange) * chartH;
      const zeroY = scaleY(0);

      // Format y-axis tick value as $Xk (or $0). Negative as -$Xk.
      const fmtAxis = (v) => {
        const k = Math.round(v / 1000);
        if (k === 0) return '$0';
        return (k < 0 ? '-' : '') + '$' + Math.abs(k) + 'k';
      };

      let svg = `<svg viewBox="0 0 ${W} ${H}" preserveAspectRatio="xMidYMid meet" style="width:100%;height:auto;display:block;">`;
      // Y-axis: 4 ticks (top, 2 middle, bottom) snapped to nearest $1k
      for (let t = 0; t <= 3; t++) {
        const v = yMin + (yRange * t / 3);
        const y = scaleY(v);
        const isZero = Math.abs(v) < 0.5;
        svg += `<line x1="${pad.l}" y1="${y}" x2="${W - pad.r}" y2="${y}" stroke="${isZero ? 'var(--text2)' : 'var(--border)'}" stroke-width="${isZero ? 1 : 0.5}"/>`;
        svg += `<text x="${pad.l - 4}" y="${y + 4}" text-anchor="end" font-size="11" fill="var(--text2)">${fmtAxis(v)}</text>`;
      }
      // Bars
      for (let i = 0; i < chartDays.length; i++) {
        const d = byDay[chartDays[i]];
        const cx = pad.l + (i + 0.5) * slotW;
        if (d.risk > 0) {
          const yTop = scaleY(d.risk);
          svg += `<rect x="${cx - riskBarW / 2}" y="${yTop}" width="${riskBarW}" height="${Math.max(0, zeroY - yTop)}" fill="var(--accent)" fill-opacity="0.4" rx="1"/>`;
        }
        if (d.pnl !== 0) {
          const pnlColor = d.pnl >= 0 ? 'var(--green)' : 'var(--red)';
          const yTop = d.pnl >= 0 ? scaleY(d.pnl) : zeroY;
          const pnlH = Math.abs(scaleY(d.pnl) - zeroY);
          svg += `<rect x="${cx - pnlBarW / 2}" y="${yTop}" width="${pnlBarW}" height="${pnlH}" fill="${pnlColor}" rx="1"/>`;
        }
        // X label only — the per-day fill counts beneath bars were noisy,
        // dropped per operator request. Day shown as MM-DD.
        const dayLabel = chartDays[i].substring(5);
        svg += `<text x="${cx}" y="${H - 8}" text-anchor="middle" font-size="10" fill="var(--text2)">${dayLabel}</text>`;
      }
      // Cumulative P&L line
      if (cumul.length >= 2) {
        const pts = chartDays.map((_, i) => {
          const cx = pad.l + (i + 0.5) * slotW;
          return cx + ',' + scaleY(cumul[i]);
        }).join(' ');
        svg += `<polyline points="${pts}" fill="none" stroke="#f5b942" stroke-width="1.8"/>`;
        for (let i = 0; i < chartDays.length; i++) {
          const cx = pad.l + (i + 0.5) * slotW;
          svg += `<circle cx="${cx}" cy="${scaleY(cumul[i])}" r="2" fill="#f5b942"/>`;
        }
      }
      svg += '</svg>';

      // Update header badge with lifetime totalPnL from Supabase, if present
      if (totalBadge) {
        const lifetime = (dailyPnlPayload && dailyPnlPayload.totalPnL != null) ? dailyPnlPayload.totalPnL : null;
        if (lifetime != null) {
          totalBadge.textContent = (lifetime >= 0 ? '+' : '-') + '$' + Math.abs(Math.round(lifetime)).toLocaleString();
          totalBadge.style.color = lifetime >= 0 ? 'var(--green)' : 'var(--red)';
        } else {
          totalBadge.textContent = '—';
        }
      }

      const byMonth = {};
      for (const [day, d] of Object.entries(byDay)) {
        const month = day.substring(0, 7);
        if (!byMonth[month]) byMonth[month] = { count: 0, risk: 0, toWin: 0, pnl: 0, settled: 0, days: [] };
        byMonth[month].count += d.count;
        byMonth[month].risk += d.risk;
        byMonth[month].toWin += d.toWin;
        byMonth[month].pnl += d.pnl;
        byMonth[month].settled += d.settled;
        byMonth[month].days.push(day);
      }
      const months = Object.keys(byMonth).sort().reverse();

      let html = '<div class="dv-chart">' + svg + '</div>';
      html += '<div class="dv-legend">'
        + '<span><span class="swatch" style="background:var(--accent);opacity:0.4;"></span>My Risk</span>'
        + '<span><span class="swatch" style="background:var(--green);"></span>Daily P&amp;L</span>'
        + '<span><span class="swatch" style="background:#f5b942;"></span>Cumulative</span>'
        + '</div>';
      html += '<div style="overflow-x:auto;"><table class="dv-table">';
      html += '<tr class="dv-header-row"><th>Month / Date</th><th class="r">Fills</th><th class="r">Risk</th><th class="r">To Win</th><th class="r">P&amp;L</th></tr>';

      for (const month of months) {
        const m = byMonth[month];
        const monthId = 'mdvm-' + month.replace(/-/g, '');
        const monthOpen = _dvExpanded.has(monthId);
        const mCls = _pnlCls(m.pnl);
        const mCaret = monthOpen ? '&#9660;' : '&#9654;';
        html += '<tr class="dv-month-row" onclick="toggleDv(\'' + monthId + '\')">';
        html += '<td><span class="dv-caret">' + mCaret + '</span> ' + month + '</td>';
        html += '<td class="r">' + m.count + '</td>';
        html += '<td class="r">' + _fmt$(m.risk) + '</td>';
        html += '<td class="r pos">' + _fmt$(m.toWin) + '</td>';
        html += '<td class="r ' + mCls + '">' + _fmtPnl(m.pnl) + '</td></tr>';

        html += '<tr id="' + monthId + '" style="display:' + (monthOpen ? 'table-row' : 'none') + ';"><td colspan="5" style="padding:0;">';
        html += '<table class="dv-table" style="width:100%;">';
        const monthDays = [...m.days].sort().reverse();
        for (const day of monthDays) {
          const d = byDay[day];
          const dayId = 'mdvd-' + day.replace(/-/g, '');
          const dayOpen = _dvExpanded.has(dayId);
          const dCls = _pnlCls(d.pnl);
          const dCaret = dayOpen ? '&#9660;' : '&#9654;';
          html += '<tr class="dv-day-row" onclick="event.stopPropagation(); toggleDv(\'' + dayId + '\')">';
          html += '<td><span class="dv-caret">' + dCaret + '</span> ' + day + '</td>';
          html += '<td class="r">' + d.count + '</td>';
          html += '<td class="r">' + _fmt$(d.risk) + '</td>';
          html += '<td class="r pos">' + _fmt$(d.toWin) + '</td>';
          html += '<td class="r ' + dCls + '">' + _fmtPnl(d.pnl) + '</td></tr>';

          html += '<tr id="' + dayId + '" style="display:' + (dayOpen ? 'table-row' : 'none') + ';"><td colspan="5" style="padding:0;">';
          html += '<table class="dv-table" style="width:100%; background:var(--surface2);">';
          const sortState = _dvSort[dayId] || { col: 'time', dir: 1 };
          const arr = (c) => sortState.col === c ? (sortState.dir > 0 ? ' ▲' : ' ▼') : '';
          const hc = (c) => 'onclick="event.stopPropagation(); dvSortClick(\'' + dayId + '\',\'' + c + '\')"';
          html += '<tr class="dv-sub-header">'
            + '<th ' + hc('time') + '>Time' + arr('time') + '</th>'
            + '<th ' + hc('selections') + '>Selections' + arr('selections') + '</th>'
            + '<th class="c" ' + hc('legs') + '>L' + arr('legs') + '</th>'
            + '<th class="r" ' + hc('odds') + '>Odds' + arr('odds') + '</th>'
            + '<th class="r" ' + hc('pnl') + '>P&amp;L' + arr('pnl') + '</th></tr>';
          const parlayRows = d.orders.filter(o => o.pnl != null).map(o => {
            const legs = o.legs || (o.meta && o.meta.legs) || [];
            const selections = legs.map(l => {
              const name = l.teamName || l.team || l.selection || l.pxEventName || '?';
              return name.length > 22 ? name.substring(0, 20) + '..' : name;
            }).join(', ');
            const timeStr = (o.confirmedAt || '').substring(11, 16) || '--:--';
            const oddsNum = o.confirmedOdds || o.offeredOdds || 0;
            const result = o.settlementResult || (o.status || '').replace('settled_', '') || '-';
            return {
              time: timeStr,
              timeSort: o.settledAt || o.confirmedAt || '',
              selections,
              legCount: legs.length,
              oddsNum,
              oddsStr: oddsNum ? (oddsNum > 0 ? '+' + oddsNum : '' + oddsNum) : '-',
              stake: o.confirmedStake || 0,
              pnl: o.pnl,
              result,
            };
          });
          parlayRows.sort((a, b) => {
            let av, bv;
            switch (sortState.col) {
              case 'selections': return sortState.dir * a.selections.localeCompare(b.selections);
              case 'legs': av = a.legCount; bv = b.legCount; break;
              case 'odds': av = a.oddsNum; bv = b.oddsNum; break;
              case 'pnl':  av = a.pnl;     bv = b.pnl;     break;
              case 'time':
              default:     av = a.timeSort; bv = b.timeSort; return sortState.dir * av.localeCompare(bv);
            }
            return sortState.dir * (av - bv);
          });
          for (const r of parlayRows) {
            const cls = _pnlCls(r.pnl);
            html += '<tr class="dv-parlay-row">';
            html += '<td style="white-space:nowrap;">' + r.time + '</td>';
            html += '<td style="max-width:160px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;" title="' + r.selections.replace(/"/g, '&quot;') + '">' + r.selections + '</td>';
            html += '<td class="c">' + r.legCount + '</td>';
            html += '<td class="r">' + r.oddsStr + '</td>';
            html += '<td class="r ' + cls + '">' + _fmtPnl(r.pnl) + '</td></tr>';
          }
          html += '</table></td></tr>';
        }
        html += '</table></td></tr>';
      }
      html += '</table></div>';
      el.innerHTML = html;
    }

    // ===== Tier 2 — Exposure tab =====
    // Game- and team-level exposure breakdown. Uses /status.exposure for
    // the in-memory tracker view + /px-positions when available for the
    // PX-native view. Renders a sortable list of game cards each with a
    // cap-fill bar so operator can see at a glance which game is closest
    // to its limit.
    let _exposureLastFetch = 0;
    async function loadExposure() {
      // Re-fetch at most every 30s to cap mobile data.
      if (Date.now() - _exposureLastFetch < 30000 && document.getElementById('exposure-section').dataset.loaded) return;
      _exposureLastFetch = Date.now();
      try {
        const [statusResp, pxPosResp] = await Promise.all([
          fetch(BASE + '/status'),
          fetch(BASE + '/px-positions').catch(() => null),
        ]);
        const status = await statusResp.json();
        const pxPos = pxPosResp ? await pxPosResp.json().catch(() => null) : null;
        renderExposure(status, pxPos);
        document.getElementById('exposure-section').dataset.loaded = '1';
      } catch (e) {
        document.getElementById('exposure-section').innerHTML = '<div class="empty">Failed to load exposure: ' + (e.message || e) + '</div>';
      }
    }

    // Per-section sort + filter + expand state for the Exposure tab.
    // Persists across re-renders so the auto-refresh poll doesn't reset
    // the operator's drill-downs.
    const _expState = {
      gameSort: 'risk', gameFilter: '',
      teamSort: 'risk', teamFilter: '',
      openGames: new Set(),  // eventId set
      openTeams: new Set(),  // teamKey set
      teamParlayCache: {},   // teamKey -> parlay rows (lazy-loaded once)
    };
    let _expLastPayload = null;

    function _rerenderExposure() {
      if (_expLastPayload) renderExposure(_expLastPayload.status, _expLastPayload.pxPos);
    }

    window.expSetGameSort  = function(v) { _expState.gameSort = v; _rerenderExposure(); };
    window.expSetGameFilter= function(v) { _expState.gameFilter = (v || '').toLowerCase(); _rerenderExposure(); };
    window.expSetTeamSort  = function(v) { _expState.teamSort = v; _rerenderExposure(); };
    window.expSetTeamFilter= function(v) { _expState.teamFilter = (v || '').toLowerCase(); _rerenderExposure(); };

    window.expToggleGame = function(eventId) {
      if (_expState.openGames.has(eventId)) _expState.openGames.delete(eventId);
      else _expState.openGames.add(eventId);
      _rerenderExposure();
    };

    window.expToggleTeam = async function(teamKey) {
      if (_expState.openTeams.has(teamKey)) {
        _expState.openTeams.delete(teamKey);
        _rerenderExposure();
        return;
      }
      _expState.openTeams.add(teamKey);
      _rerenderExposure();
      // Lazy-fetch the parlay list for this team (one /orders call,
      // results cached). The team payload in /status only carries a
      // count, not the list, so we cross-reference against orders.
      if (!_expState.teamParlayCache[teamKey]) {
        try {
          const r = await fetch(BASE + '/orders');
          const data = await r.json();
          const orders = data.recentOrders || [];
          // Match parlays whose any leg has a matching teamKey. Team key
          // shape from order-tracker exposure snapshot is
          // "<normName>|<eventId>|<dateYYYY-MM-DD>" — split off the name.
          const targetName = (teamKey.split('|')[0] || '').toLowerCase();
          const targetEvent = teamKey.split('|')[1] || '';
          const matches = orders.filter(o => {
            if (o.status !== 'confirmed' && !(o.status || '').startsWith('settled_')) return false;
            if (o.meta && o.meta.phantom) return false;
            const legs = o.legs || (o.meta && o.meta.legs) || [];
            return legs.some(l => {
              const eid = String(l.pxEventId || '');
              if (targetEvent && eid !== targetEvent) return false;
              const name = ((l.teamName || l.team || '') + '').toLowerCase();
              return name && (name === targetName || name.includes(targetName) || targetName.includes(name));
            });
          });
          _expState.teamParlayCache[teamKey] = matches;
        } catch (e) {
          _expState.teamParlayCache[teamKey] = [];
        }
        _rerenderExposure();
      }
    };

    function _renderParlayRows(parlays) {
      if (!parlays || parlays.length === 0) return '<div class="empty-mini">No parlays</div>';
      // Each row: stake · payout · selection · time
      return parlays.slice(0, 30).map(p => {
        const stake = (p.stake != null) ? '$' + Math.round(p.stake).toLocaleString() : (p.confirmedStake ? '$' + Math.round(p.confirmedStake).toLocaleString() : '');
        const payout = (p.payout != null) ? '$' + Math.round(p.payout).toLocaleString() : '';
        const sel = p.selection || (p.legs && p.legs[0] && p.legs[0].selection) || '';
        const market = p.market || (p.legs && p.legs[0] && p.legs[0].marketType) || '';
        const teamName = p.teamName || '';
        const time = p.confirmedAt ? new Date(p.confirmedAt).toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit' }) : '';
        const label = teamName
          ? `${escapeHtml(teamName)} ${escapeHtml(market)} ${escapeHtml(sel)}`
          : (p.legs ? `${p.legs.length}-leg parlay` : '?');
        const meta = [stake, payout, time].filter(Boolean).join(' · ');
        return `<div class="leg-line"><span class="leg-name">${label}</span><span class="leg-meta">${meta}</span></div>`;
      }).join('');
    }

    function _renderTeamParlayRows(orders) {
      if (orders === undefined) return '<div class="row-detail loading">Loading parlays…</div>';
      if (!orders || orders.length === 0) return '<div class="row-detail open"><div class="empty-mini">No matching parlays in the last buffer window.</div></div>';
      const html = orders.slice(0, 30).map(o => {
        const stake = o.confirmedStake ? '$' + Math.round(o.confirmedStake).toLocaleString() : '';
        const odds = o.confirmedOdds || o.offeredOdds;
        const oddsStr = odds ? (odds > 0 ? '+' + odds : '' + odds) : '';
        const time = o.confirmedAt ? new Date(o.confirmedAt).toLocaleTimeString('en-US', { timeZone: 'America/New_York', hour: 'numeric', minute: '2-digit' }) : '';
        const legs = o.legs || (o.meta && o.meta.legs) || [];
        const label = legs.length + '-leg ' + oddsStr;
        const meta = [stake, time].filter(Boolean).join(' · ');
        return `<div class="leg-line"><span class="leg-name">${label}</span><span class="leg-meta">${meta}</span></div>`;
      }).join('');
      return '<div class="row-detail open">' + html + '</div>';
    }

    function renderExposure(status, pxPos) {
      _expLastPayload = { status, pxPos };
      const el = document.getElementById('exposure-section');
      const exp = status.exposure || {};
      const portfolio = status.portfolio || {};

      const teams = Array.isArray(exp.teams) ? exp.teams : [];
      const games = Array.isArray(exp.games) ? exp.games : [];
      const teamCap = exp.maxPerTeam || 0;
      const gameCap = exp.maxPerGame || exp.maxExposurePerGame || 0;

      const fmtMoney = (v) => '$' + Math.round(v).toLocaleString();
      const capPct = (cur, cap) => cap > 0 ? Math.min(100, (cur / cap) * 100) : 0;
      const capCls = (pct) => pct >= 90 ? 'danger' : pct >= 70 ? 'warn' : '';

      let html = '';

      // ---- Portfolio summary ----
      const pxOpen = pxPos && pxPos.ok && pxPos.openExposure != null ? pxPos.openExposure : (portfolio.totalRisk || 0);
      const toWin = portfolio.totalToWin || 0;
      html += '<div class="data-card">';
      html += '<h3>Portfolio</h3>';
      html += `<div class="row"><span class="label">Open exposure</span><span class="value">${fmtMoney(pxOpen)}</span></div>`;
      html += `<div class="row"><span class="label">To win</span><span class="value" style="color:var(--green);">${fmtMoney(toWin)}</span></div>`;
      html += `<div class="row"><span class="label">Active games</span><span class="value">${games.length}</span></div>`;
      html += `<div class="row"><span class="label">Active teams</span><span class="value">${teams.length}</span></div>`;
      html += '</div>';

      // ---- By Game ----
      // Game card has parlay list embedded in /status payload (game.parlays[])
      // so we expand inline without an extra fetch.
      const gameRowsRaw = games
        .map(g => ({
          id: String(g.eventId || g.name || ''),
          label: g.name || g.eventId,
          risk: g.netExposure != null ? g.netExposure : (g.grossRisk || 0),
          parlayCount: g.parlayCount || (g.parlays ? g.parlays.length : 0),
          sport: g.sport || '',
          startTime: g.startTime || '',
          parlays: g.parlays || [],
        }))
        .filter(g => g.risk > 0);

      const gameFiltered = _expState.gameFilter
        ? gameRowsRaw.filter(g => g.label.toLowerCase().includes(_expState.gameFilter) || (g.sport || '').toLowerCase().includes(_expState.gameFilter))
        : gameRowsRaw;

      const gameSorted = [...gameFiltered].sort((a, b) => {
        switch (_expState.gameSort) {
          case 'parlays': return b.parlayCount - a.parlayCount;
          case 'name':    return a.label.localeCompare(b.label);
          case 'sport':   return (a.sport || '').localeCompare(b.sport || '');
          case 'time':    return (a.startTime || '').localeCompare(b.startTime || '');
          case 'risk':
          default:        return b.risk - a.risk;
        }
      });

      html += '<div class="data-card">';
      html += '<h3>By Game · ' + gameRowsRaw.length + (gameFiltered.length !== gameRowsRaw.length ? ` (showing ${gameFiltered.length})` : '') + '</h3>';
      html += '<div class="toolbar">';
      html += `<input type="text" placeholder="Filter games…" value="${escapeHtml(_expState.gameFilter)}" oninput="expSetGameFilter(this.value)" />`;
      html += '<select onchange="expSetGameSort(this.value)">';
      const gOpts = { risk: 'Risk ↓', parlays: 'Parlays ↓', name: 'Name A-Z', sport: 'Sport', time: 'Start time' };
      for (const [v, label] of Object.entries(gOpts)) html += `<option value="${v}" ${_expState.gameSort === v ? 'selected' : ''}>${label}</option>`;
      html += '</select>';
      if (_expState.gameFilter) html += `<button class="clear-btn" onclick="expSetGameFilter('')">×</button>`;
      html += '</div>';

      if (gameSorted.length === 0) {
        html += '<div class="empty-mini">No games match.</div>';
      } else {
        for (const g of gameSorted.slice(0, 50)) {
          const pct = capPct(g.risk, gameCap);
          const cls = capCls(pct);
          const isOpen = _expState.openGames.has(g.id);
          const sportLbl = g.sport ? g.sport.replace(/_/g, ' ') : '';
          html += `<div class="row expandable ${isOpen ? 'open' : ''}" onclick="expToggleGame('${g.id.replace(/'/g, "&#39;")}')">`;
          html += `<span class="label"><span class="caret-mini">▶</span>${escapeHtml(g.label)}<div class="sublabel">${fmtMoney(g.risk)} · ${g.parlayCount} parlay${g.parlayCount === 1 ? '' : 's'}${sportLbl ? ' · ' + sportLbl : ''}</div></span>`;
          html += `<span class="value ${cls}">${fmtMoney(g.risk)}</span></div>`;
          if (gameCap) html += `<div class="bar-track"><div class="bar-fill ${cls}" style="width:${pct}%"></div></div>`;
          if (isOpen) {
            html += `<div class="row-detail open">${_renderParlayRows(g.parlays)}</div>`;
          }
        }
      }
      html += '</div>';

      // ---- By Team ----
      const teamRowsRaw = teams
        .map(t => ({
          key: t.key || t.teamKey || (t.name || ''),
          name: t.name || t.teamKey || t.key,
          risk: t.netExposure != null ? t.netExposure : (t.risk || 0),
          parlays: t.parlays || 0,
          sport: t.sport || '',
          eventName: t.eventName || '',
        }))
        .filter(t => t.risk > 0);

      const teamFiltered = _expState.teamFilter
        ? teamRowsRaw.filter(t => t.name.toLowerCase().includes(_expState.teamFilter) || t.eventName.toLowerCase().includes(_expState.teamFilter))
        : teamRowsRaw;

      const teamSorted = [...teamFiltered].sort((a, b) => {
        switch (_expState.teamSort) {
          case 'parlays': return b.parlays - a.parlays;
          case 'name':    return a.name.localeCompare(b.name);
