<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Pricing Gap vs Sportsbooks</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0d1117; color:#c9d1d9; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif; padding:24px; }
  .header { display:flex; justify-content:space-between; align-items:baseline; margin-bottom:20px; }
  h1 { font-size:22px; font-weight:700; }
  .ts { font-size:12px; color:#8b949e; }
  .cards { display:flex; gap:16px; margin-bottom:24px; flex-wrap:wrap; }
  .card { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:16px 20px; min-width:200px; flex:1; }
  .card-label { font-size:11px; text-transform:uppercase; color:#8b949e; margin-bottom:4px; letter-spacing:0.5px; }
  .card-value { font-size:28px; font-weight:700; }
  .card-sub { font-size:12px; color:#8b949e; margin-top:4px; }
  .positive { color:#3fb950; }
  .negative { color:#f85149; }
  .neutral { color:#d29922; }
  .chart-container { background:#161b22; border:1px solid #30363d; border-radius:8px; padding:20px; margin-bottom:20px; }
  .chart-title { font-size:14px; font-weight:600; margin-bottom:12px; }
  svg text { font-family:inherit; }
  .legend { display:flex; gap:20px; margin-top:8px; font-size:12px; }
  .legend-item { display:flex; align-items:center; gap:6px; }
  .legend-dot { width:10px; height:10px; border-radius:50%; }
  .dist-container { display:flex; gap:16px; flex-wrap:wrap; }
  .dist-box { flex:1; min-width:250px; }
  .dist-box h3 { font-size:13px; margin-bottom:8px; }
</style>
</head>
<body>
<div class="header">
  <h1>Pricing Gap vs Sportsbooks</h1>
  <div class="ts" id="timestamp"></div>
</div>

<div class="cards" id="cards"></div>

<div class="chart-container">
  <div class="chart-title">Hourly Average Gap (pp) — Positive = We Charge More</div>
  <div id="timeChart"></div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:#58a6ff;"></div>vs Pinnacle</div>
    <div class="legend-item"><div class="legend-dot" style="background:#3fb950;"></div>vs FanDuel</div>
    <div class="legend-item"><div class="legend-dot" style="background:#d29922;"></div>vs Kalshi</div>
  </div>
</div>

<div class="chart-container">
  <div class="chart-title">Gap Distribution (per-leg, pp)</div>
  <div class="dist-container" id="distributions"></div>
</div>

<script>
async function loadData() {
  // Try fetching live from the service, fall back to embedded
  let data;
  try {
    const resp = await fetch('pricing-gap-data.json');
    data = await resp.json();
  } catch(e) {
    document.body.innerHTML = '<h1 style="color:#f85149;">Could not load pricing-gap-data.json</h1>';
    return;
  }
  render(data);
}

function render(data) {
  document.getElementById('timestamp').textContent = 'Generated: ' + new Date(data.generated).toLocaleString();

  // Summary cards
  const cards = document.getElementById('cards');
  const mkCard = (label, book, color) => {
    const d = data.summary[book];
    if (!d || d.legs === 0) return '';
    const cls = parseFloat(d.avg) >= 0 ? 'positive' : 'negative';
    return '<div class="card"><div class="card-label">' + label + '</div>' +
      '<div class="card-value ' + cls + '">' + (parseFloat(d.avg) >= 0 ? '+' : '') + d.avg + 'pp</div>' +
      '<div class="card-sub">Median: ' + (parseFloat(d.med) >= 0 ? '+' : '') + d.med + 'pp · ' + d.legs + ' legs · ' + d.pctBelow + '% below</div></div>';
  };
  cards.innerHTML = mkCard('vs Pinnacle', 'pin', '#58a6ff') + mkCard('vs FanDuel', 'fd', '#3fb950') + mkCard('vs Kalshi', 'kl', '#d29922');

  // Time series chart
  const series = data.series;
  if (series.length < 2) {
    document.getElementById('timeChart').innerHTML = '<div style="color:#8b949e; padding:20px;">Not enough data points for time chart</div>';
  } else {
    const W = 860, H = 300, pad = { l:55, r:20, t:10, b:50 };
    const cW = W-pad.l-pad.r, cH = H-pad.t-pad.b;

    let allVals = [];
    series.forEach(s => { if(s.pinAvg!=null) allVals.push(s.pinAvg); if(s.fdAvg!=null) allVals.push(s.fdAvg); if(s.klAvg!=null) allVals.push(s.klAvg); });
    let minV = Math.min(...allVals, -2), maxV = Math.max(...allVals, 2);
    const range = maxV - minV || 4;
    minV -= range*0.1; maxV += range*0.1;
    const vRange = maxV - minV;

    const scX = i => pad.l + (i/(series.length-1))*cW;
    const scY = v => pad.t + cH - ((v-minV)/vRange)*cH;

    let svg = '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;max-width:'+W+'px;height:auto;">';

    // Zero line
    if (minV < 0 && maxV > 0) {
      const zy = scY(0);
      svg += '<line x1="'+pad.l+'" y1="'+zy+'" x2="'+(pad.l+cW)+'" y2="'+zy+'" stroke="#484f58" stroke-width="1" stroke-dasharray="4,4"/>';
      svg += '<text x="'+(pad.l-8)+'" y="'+(zy+4)+'" text-anchor="end" fill="#8b949e" font-size="11">0</text>';
    }

    // Y gridlines
    const yStep = vRange > 10 ? 2 : vRange > 4 ? 1 : 0.5;
    for (let v = Math.ceil(minV/yStep)*yStep; v <= maxV; v += yStep) {
      if (Math.abs(v) < 0.01) continue;
      const y = scY(v);
      svg += '<line x1="'+pad.l+'" y1="'+y+'" x2="'+(pad.l+cW)+'" y2="'+y+'" stroke="#21262d" stroke-width="1"/>';
      svg += '<text x="'+(pad.l-8)+'" y="'+(y+4)+'" text-anchor="end" fill="#8b949e" font-size="10">'+(v>=0?'+':'')+v.toFixed(1)+'</text>';
    }

    // Draw lines
    const drawLine = (key, color) => {
      const pts = series.map((s,i) => s[key] != null ? [scX(i), scY(s[key])] : null).filter(Boolean);
      if (pts.length < 2) return;
      const path = pts.map((p,i) => (i===0?'M':'L')+p[0]+','+p[1]).join(' ');
      svg += '<path d="'+path+'" fill="none" stroke="'+color+'" stroke-width="2" opacity="0.85"/>';
      pts.forEach(p => { svg += '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3" fill="'+color+'"/>'; });
    };
    drawLine('pinAvg', '#58a6ff');
    drawLine('fdAvg', '#3fb950');
    drawLine('klAvg', '#d29922');

    // X labels (every few hours)
    const labelEvery = Math.max(1, Math.floor(series.length / 10));
    series.forEach((s, i) => {
      if (i % labelEvery !== 0 && i !== series.length-1) return;
      const x = scX(i);
      const label = s.hour.substring(5,10) + ' ' + s.hour.substring(11,13) + 'h';
      svg += '<text x="'+x+'" y="'+(pad.t+cH+18)+'" text-anchor="middle" fill="#8b949e" font-size="10">'+label+'</text>';
    });

    svg += '</svg>';
    document.getElementById('timeChart').innerHTML = svg;
  }

  // Distribution histograms
  const distEl = document.getElementById('distributions');
  const drawDist = (label, gaps, color) => {
    if (!gaps || gaps.length < 3) return '';
    const W2 = 280, H2 = 150, p = { l:40, r:10, t:10, b:30 };
    const cw = W2-p.l-p.r, ch = H2-p.t-p.b;
    const bins = 25;
    const mn = Math.min(...gaps), mx = Math.max(...gaps);
    const rng = mx - mn || 1;
    const bSize = rng / bins;
    const counts = new Array(bins).fill(0);
    gaps.forEach(g => { let idx = Math.floor((g-mn)/bSize); if(idx>=bins) idx=bins-1; counts[idx]++; });
    const maxC = Math.max(...counts);

    let svg2 = '<svg viewBox="0 0 '+W2+' '+H2+'" style="width:100%;max-width:'+W2+'px;height:auto;">';
    const bw = cw / bins;
    counts.forEach((c, i) => {
      const h = (c/maxC)*ch;
      const x = p.l + i*bw;
      const binMid = mn + (i+0.5)*bSize;
      const fill = binMid >= 0 ? color : '#f85149';
      svg2 += '<rect x="'+x+'" y="'+(p.t+ch-h)+'" width="'+(bw-1)+'" height="'+h+'" fill="'+fill+'" opacity="0.7"/>';
    });
    // Zero line
    if (mn < 0 && mx > 0) {
      const zx = p.l + ((0-mn)/rng)*cw;
      svg2 += '<line x1="'+zx+'" y1="'+p.t+'" x2="'+zx+'" y2="'+(p.t+ch)+'" stroke="#fff" stroke-width="1"/>';
    }
    svg2 += '</svg>';
    return '<div class="dist-box"><h3>' + label + ' (' + gaps.length + ' legs)</h3>' + svg2 + '</div>';
  };
  distEl.innerHTML = drawDist('vs Pinnacle', data.distributions.pin, '#58a6ff') +
    drawDist('vs FanDuel', data.distributions.fd, '#3fb950') +
    drawDist('vs Kalshi', data.distributions.kl, '#d29922');
}

loadData();
</script>
</body>
</html>
